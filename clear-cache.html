<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>清除 PWA 缓存</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: #f6f9fd;
      color: #14213d;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(100%, 420px);
      padding: 18px;
      border: 1px solid #dce4ef;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 18px 42px rgba(27, 55, 104, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    p {
      margin: 0 0 14px;
      color: #687795;
      line-height: 1.6;
    }

    button,
    a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      margin-top: 10px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
      font: inherit;
      font-weight: 800;
      text-decoration: none;
    }

    .danger {
      background: linear-gradient(180deg, #ff6b8a, #d9234e);
    }

    .secondary {
      background: #eef4ff;
      color: #2f6fe4;
    }

    #status {
      min-height: 24px;
      margin-top: 12px;
      color: #34a177;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>清除 PWA 缓存</h1>
    <p>如果手机上一直显示旧版本，先点“清除缓存”，完成后回到首页并刷新。</p>
    <button id="clearCache" type="button">清除 PWA 缓存</button>
    <button id="clearAll" class="danger" type="button">清除缓存和交易记录</button>
    <a class="secondary" href="./index.html?fresh=1">回到首页</a>
    <div id="status" role="status" aria-live="polite"></div>
  </main>

  <script>
    async function clearPwaCache(clearStorage) {
      const status = document.getElementById("status");
      status.textContent = "正在清理...";

      if ("serviceWorker" in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map((registration) => registration.unregister()));
      }

      if ("caches" in window) {
        const names = await caches.keys();
        await Promise.all(names.map((name) => caches.delete(name)));
      }

      if (clearStorage) {
        localStorage.removeItem("trade-record-generator-v1");
        localStorage.removeItem("trade-record-generator-v2");
      }

      status.textContent = clearStorage ? "已清除缓存和交易记录。" : "已清除 PWA 缓存。";
    }

    document.getElementById("clearCache").addEventListener("click", () => {
      clearPwaCache(false);
    });

    document.getElementById("clearAll").addEventListener("click", () => {
      if (confirm("确认连交易记录也一起清除？")) {
        clearPwaCache(true);
      }
    });
  </script>
</body>
</html>
