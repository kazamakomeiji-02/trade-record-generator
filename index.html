<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2f6fe4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="交易记录生成器">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>交易记录生成器</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f6f9fd;
      --ink: #14213d;
      --muted: #687795;
      --line: #e2e8f2;
      --panel: #172a4b;
      --field: rgba(255, 255, 255, 0.08);
      --field-soft: rgba(255, 255, 255, 0.11);
      --accent: #2f6fe4;
      --accent-soft: #eaf2ff;
      --side: rgba(255, 255, 255, 0.82);
      --good: #34b685;
      --bad: #ef476f;
      --paper: #ffffff;
      --shadow: 0 18px 42px rgba(27, 55, 104, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 16% 0%, rgba(73, 132, 246, 0.14), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--page) 100%);
      color: var(--ink);
    }

    body {
      padding: max(12px, env(safe-area-inset-top)) 10px max(24px, env(safe-area-inset-bottom)) 92px;
      font-size: 15px;
      touch-action: manipulation;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 940px);
      margin: 0 auto;
    }

    .layout {
      display: grid;
      grid-template-columns: 244px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      width: min(100%, 1180px);
      margin: 0 auto;
    }

    .side-backdrop {
      display: none;
    }

    .sidebar {
      position: sticky;
      top: max(12px, env(safe-area-inset-top));
      height: calc(100vh - 24px - env(safe-area-inset-top));
      padding: 12px;
      border: 1px solid rgba(199, 211, 229, 0.72);
      border-radius: 12px;
      background: var(--side);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: auto;
      font-size: 22.5px;
    }

    .side-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 900;
      color: var(--ink);
    }

    .side-toggle {
      flex: 0 0 auto;
      min-width: 34px;
      height: 30px;
      padding: 0 8px;
      border-radius: 8px;
      border: 1px solid #d6e0ef;
      background: #fff;
      color: var(--ink);
      font-size: 19.5px;
      font-weight: 900;
    }

    .side-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .side-actions button {
      min-height: 32px;
      border-radius: 8px;
      border: 1px solid #d6e0ef;
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      font-size: 15px;
      font-weight: 900;
    }

    .side-actions button:first-child {
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      border-color: #2f6fe4;
      color: #fff;
    }

    .side-actions button.is-active {
      background: #fff4df;
      border-color: #ffd89b;
      color: #9a5c00;
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-content: flex-start;
    }

    .record-pill {
      position: relative;
      display: grid;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      min-height: 34px;
      padding: 10px;
      border: 1px solid #d6e0ef;
      border-radius: 10px;
      background: #fff;
      color: #304052;
      text-align: left;
      overflow: hidden;
      cursor: pointer;
    }

    .record-pill.is-active {
      border-color: #2f6fe4;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
      box-shadow: 0 8px 18px rgba(47, 111, 228, 0.28);
    }

    .record-pill.is-breakout {
      border-color: #ffd2dc;
      background: linear-gradient(180deg, #fff8fa, #fff0f4);
    }

    .record-pill.is-pullback {
      border-color: #cfe0ff;
      background: linear-gradient(180deg, #f8fbff, #eef5ff);
    }

    .record-pill.is-breakout.is-active {
      border-color: #ef476f;
      background: linear-gradient(180deg, #ff6b8a, #d9234e);
      box-shadow: 0 8px 18px rgba(217, 35, 78, 0.28);
    }

    .record-pill.is-pullback.is-active {
      border-color: #2f6fe4;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      box-shadow: 0 8px 18px rgba(47, 111, 228, 0.28);
    }

    .record-title {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-right: 28px;
      min-width: 0;
      overflow: hidden;
      font-size: 21px;
      font-weight: 900;
    }

    .record-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logic-badge {
      flex: 0 0 auto;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 16.5px;
      font-weight: 900;
      line-height: 1.25;
    }

    .logic-badge.is-breakout {
      background: #fff1f3;
      color: #d9234e;
    }

    .logic-badge.is-pullback {
      background: #eaf2ff;
      color: #2f6fe4;
    }

    .record-pill.is-active .logic-badge.is-breakout {
      background: rgba(255, 255, 255, 0.22);
      color: #ffd9e1;
    }

    .record-pill.is-active .logic-badge.is-pullback {
      background: rgba(255, 255, 255, 0.22);
      color: #d8e7ff;
    }

    .record-meta {
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .record-compact {
      display: none;
    }

    .record-pill.is-active .record-meta,
    .record-pill.is-active .record-line span,
    .record-pill.is-active .record-detail {
      color: rgba(255, 255, 255, 0.82);
    }

    .record-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      padding-right: 34px;
      color: #2c3f5f;
      font-size: 18px;
      line-height: 1.25;
    }

    .record-line {
      min-width: 0;
    }

    .record-line span {
      display: block;
      color: var(--muted);
      font-size: 16.5px;
      font-weight: 700;
    }

    .record-line strong {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 19.5px;
      font-weight: 900;
    }

    .record-actions {
      position: absolute;
      top: 4px;
      right: 4px;
      z-index: 4;
      display: flex;
      gap: 6px;
    }

    .record-delete,
    .record-archive {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: #fff1f4;
      color: #bd284d;
      border: 1px solid #ffd3dd;
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      touch-action: manipulation;
    }

    .record-archive {
      background: #eef6ff;
      color: #245bc9;
      border-color: #cfe0ff;
      font-size: 18px;
    }

    .record-pill.is-active .record-delete {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.24);
      color: #fff;
    }

    .record-pill.is-active .record-archive {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.24);
      color: #fff;
    }

    .record-pill.is-archived {
      opacity: 0.82;
      filter: grayscale(0.2);
    }

    .record-sort {
      position: absolute;
      right: 4px;
      bottom: 4px;
      z-index: 4;
      display: grid;
      gap: 8px;
    }

    .record-sort button {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: #f1f5fb;
      color: #56657d;
      border: 1px solid #d6e0ef;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      touch-action: manipulation;
    }

    .record-pill.is-active .record-sort button {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.24);
      color: #fff;
    }

    .record-sort button.is-highlight {
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      border-color: #2f6fe4;
      color: #fff;
    }

    .record-pill.is-active .record-sort button.is-highlight {
      background: rgba(255, 255, 255, 0.34);
      border-color: rgba(255, 255, 255, 0.42);
      color: #fff;
    }

    .record-sort button[hidden] {
      display: none;
    }

    .empty-records {
      color: var(--muted);
      font-size: 19.5px;
      line-height: 1.5;
    }

    .toolbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 10px;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      width: 72px;
      padding: 8px;
      border: 1px solid rgba(217, 225, 234, 0.9);
      border-radius: 12px;
      background: rgba(246, 249, 253, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .toolbar button {
      min-height: 40px;
      padding: 0 6px;
      border-radius: 8px;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
      font-weight: 700;
      white-space: normal;
      line-height: 1.15;
    }

    .toolbar .secondary {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border: 1px solid #d4d9e2;
    }

    .sheet {
      background: var(--paper);
      border: 1px solid rgba(217, 225, 234, 0.8);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .risk-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .risk-field {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      min-height: 46px;
      border-right: 1px solid var(--line);
    }

    .risk-field:last-child {
      border-right: 0;
    }

    .risk-field label {
      padding-left: 14px;
      font-weight: 900;
      white-space: nowrap;
    }

    .risk-field input {
      width: 100%;
      min-width: 0;
      border: 0;
      background: transparent;
      padding: 8px 10px;
      color: var(--ink);
      font-weight: 900;
      outline: 0;
    }

    .risk-field.is-warning {
      background: #fff3a6;
    }

    .risk-field.is-warning input {
      color: #d9234e;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1.35fr;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
    }

    .meta-field {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      min-height: 52px;
      border-right: 1px solid var(--line);
    }

    .meta-field:last-child {
      border-right: 0;
    }

    .meta-field.full-row {
      grid-column: 1 / -1;
      border-top: 1px solid var(--line);
      border-right: 0;
    }

    .meta-field label {
      padding-left: 16px;
      font-weight: 800;
      white-space: nowrap;
    }

    .time-stop-toggle {
      min-height: 34px;
      margin-left: 10px;
      padding: 0 10px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: #245bc9;
      font-weight: 900;
      white-space: nowrap;
    }

    .time-stop-toggle[aria-pressed="false"] {
      background: #eef2f7;
      color: var(--muted);
      box-shadow: inset 0 0 0 1px #d7deea;
    }

    .meta-field.is-disabled {
      background: #f0f3f7;
      color: #8b97a8;
    }

    .meta-field.is-disabled select {
      display: none;
      color: #9aa5b6;
      opacity: 0.72;
    }

    .meta-field input,
    .meta-field select {
      width: 100%;
      min-width: 0;
      border: 0;
      background: transparent;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--ink);
      outline: 0;
    }

    .time-combo {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 8px;
      width: 100%;
      min-width: 0;
      padding-right: 10px;
    }

    .time-combo input,
    .time-combo select {
      padding-left: 0;
      padding-right: 0;
    }

    .time-stop-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .calculator {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 0 0;
    }

    .dark-panel {
      min-height: 176px;
      padding: 12px;
      border-radius: 10px;
      background:
        radial-gradient(circle at 14% 8%, rgba(80, 132, 245, 0.3), transparent 32%),
        linear-gradient(145deg, #223d70, #0f213e 72%);
      color: #d7dde5;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 28px rgba(17, 35, 66, 0.14);
    }

    .dark-panel.summary {
      grid-column: 1 / -1;
      min-height: 172px;
      display: grid;
      align-content: stretch;
      gap: 0;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
    }

    .field-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      min-height: 76px;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 8px;
      background: var(--field);
      color: #e6eefb;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .field-card::before {
      display: none;
    }

    .field-card input {
      grid-column: 2;
      grid-row: 2;
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #f8fafc;
      font-size: 28px;
      text-align: left;
      font-weight: 800;
    }

    .field-card .label {
      grid-column: 2;
      grid-row: 1;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 800;
    }

    .field-card .label small {
      margin-left: 6px;
      color: #b8c0cb;
      font-size: 11px;
      font-weight: 800;
    }

    .field-card > span:not(.label):not(.sub) {
      grid-column: 3;
      grid-row: 1 / span 2;
      color: #e6eefb;
      font-weight: 800;
    }

    .field-card .sub {
      grid-column: 3;
      grid-row: 2;
      text-align: right;
      color: #b8c0cb;
      font-size: 11px;
      font-weight: 700;
      padding-top: 2px;
    }

    .field-card.combo-card {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field-mini {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px;
      align-items: end;
      min-width: 0;
    }

    .field-mini .label {
      grid-column: 1 / -1;
      grid-row: auto;
    }

    .field-mini input {
      grid-column: 1;
      grid-row: auto;
    }

    .field-mini span:not(.label) {
      grid-column: 2;
      grid-row: auto;
      color: #e6eefb;
      font-weight: 800;
    }

    .chip-row {
      display: flex;
      gap: 6px;
      min-height: 30px;
      margin-bottom: 8px;
      padding: 6px;
      border-radius: 7px;
      background: var(--field-soft);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .chip-row::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      min-height: 22px;
      padding: 2px 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.04);
      color: #cfd6df;
      font-size: 12px;
      font-weight: 700;
    }

    .dynamic-stop {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 8px;
      background: var(--field);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .dynamic-stop-head {
      display: block;
    }

    .dynamic-stop-label {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: #245bc9;
      font-size: 15px;
      font-weight: 800;
    }

    .dynamic-stop-label[aria-pressed="false"] {
      background: rgba(255, 255, 255, 0.1);
      color: #b8c0cb;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .dynamic-stop.is-disabled {
      background: rgba(255, 255, 255, 0.05);
      color: #9aa5b6;
    }

    .dynamic-stop.is-disabled .dynamic-stop-body {
      display: none;
    }

    .dynamic-stop .tag-control,
    .dynamic-stop .new-tag,
    .dynamic-stop .tag-list {
      margin-bottom: 0;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 42px 1fr auto auto;
      align-items: baseline;
      gap: 12px;
      padding: 9px 18px;
      border-bottom: 1px solid var(--line);
    }

    .summary-row:last-child {
      border-bottom: 0;
    }

    .summary-row::before {
      content: attr(data-icon);
      display: grid;
      place-items: center;
      align-self: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(180deg, #5e95ff, #2f6fe4);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
    }

    .summary-row span:first-child {
      color: #34425c;
      font-weight: 700;
    }

    .summary-row strong {
      color: #12234a;
      font-size: 20px;
      text-align: right;
    }

    .summary-row small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }

    .summary-row.is-risk-warning {
      background: #fff3a6;
    }

    .summary-row.is-risk-warning span,
    .summary-row.is-risk-warning strong,
    .summary-row.is-risk-warning small {
      color: #d9234e;
    }

    .matrix {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .matrix th,
    .matrix td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .matrix th:last-child,
    .matrix td:last-child {
      border-right: 0;
    }

    .matrix thead th {
      height: 46px;
      padding: 10px 8px;
      font-size: 13px;
      text-align: center;
      font-weight: 800;
    }

    .logic-head {
      width: 150px;
      font-size: 18px !important;
    }

    .logic-choice {
      width: 100%;
      height: 34px;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      font-weight: 900;
    }

    .logic-choice.is-active {
      background: var(--accent-soft);
      color: #2f6fe4;
      box-shadow: inset 0 0 0 1px rgba(47, 111, 228, 0.18);
    }

    .matrix[data-logic="breakout"] tbody .pullback-col,
    .matrix[data-logic="pullback"] tbody .breakout-col {
      display: none;
    }

    .row-title {
      width: 150px;
      padding: 0 8px;
      text-align: center;
      vertical-align: middle !important;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 900;
      white-space: pre-line;
    }

    .row-title span {
      display: inline-block;
      align-items: center;
      text-align: left;
      white-space: nowrap;
    }

    .row-title span::before {
      display: none;
    }

    .cell-box {
      min-height: 170px;
      padding: 12px;
    }

    .tag-control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag-control select,
    .new-tag input {
      width: 100%;
      min-width: 0;
      height: 34px;
      border: 1px solid #dce4ef;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      padding: 0 8px;
      outline: 0;
    }

    .tag-control button,
    .new-tag button {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: #f4f7fc;
      border: 1px solid #dce4ef;
      color: #1c376b;
      font-size: 20px;
      font-weight: 900;
    }

    .new-tag {
      display: none;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 8px;
    }

    .new-tag.is-open {
      display: grid;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 32px;
      margin-bottom: 8px;
    }

    .note-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      padding: 4px 7px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #245bc9;
      font-size: 12px;
      font-weight: 800;
    }

    .note-tag button {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(47, 111, 228, 0.16);
      color: #245bc9;
      line-height: 18px;
      font-size: 12px;
    }

    .subpage {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      padding: max(14px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
      background: rgba(246, 249, 253, 0.96);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    .subpage.is-open {
      display: block;
    }

    .subpage-inner {
      width: min(100%, 860px);
      margin: 0 auto;
      border: 1px solid rgba(217, 225, 234, 0.9);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .subpage-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .subpage-head h2 {
      margin: 0;
      font-size: 18px;
      color: var(--ink);
    }

    .subpage-head button,
    .tag-add button,
    .tag-delete {
      min-height: 34px;
      border-radius: 8px;
      font-weight: 800;
    }

    .subpage-head button {
      width: 34px;
      background: #f1f5fb;
      color: var(--ink);
      font-size: 18px;
    }

    .tag-manager {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 14px;
    }

    .tag-section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdff;
      overflow: hidden;
    }

    .tag-section h3 {
      margin: 0;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      color: var(--ink);
    }

    .tag-add {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .tag-add input {
      width: 100%;
      min-width: 0;
      height: 36px;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      padding: 0 10px;
      outline: 0;
    }

    .tag-add button {
      padding: 0 12px;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
    }

    .managed-tags {
      display: grid;
      gap: 8px;
      min-height: 120px;
      padding: 10px;
      align-content: start;
    }

    .managed-tag {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      background: #fff;
    }

    .managed-tag span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      color: #2b3d59;
    }

    .tag-delete {
      padding: 0 10px;
      background: #fff1f4;
      color: #bd284d;
      border: 1px solid #ffd3dd;
    }

    .tag-empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .paste-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .paste-panel textarea {
      width: 100%;
      min-height: 46vh;
      border: 1px solid #dce4ef;
      border-radius: 10px;
      padding: 12px;
      color: var(--ink);
      font: inherit;
      line-height: 1.45;
      outline: 0;
      resize: vertical;
    }

    .paste-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .paste-actions button {
      min-height: 40px;
      border-radius: 8px;
      font-weight: 900;
    }

    .record-line.is-risk-warning {
      padding: 4px;
      border-radius: 6px;
      background: #fff3a6;
    }

    .record-line.is-risk-warning span,
    .record-line.is-risk-warning strong {
      color: #d9234e !important;
    }

    .paste-actions button:first-child {
      background: #eef3fb;
      color: var(--ink);
      border: 1px solid #dce4ef;
    }

    .paste-actions button:last-child {
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
    }

    .archive-form {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .archive-form label {
      display: grid;
      gap: 6px;
      color: var(--ink);
      font-weight: 800;
    }

    .archive-form select,
    .archive-form input {
      width: 100%;
      min-height: 40px;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      padding: 0 10px;
      color: var(--ink);
      font: inherit;
      outline: 0;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 50;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      max-width: calc(100vw - 32px);
      padding: 10px 14px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: 14px;
      transition: opacity 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .toast.is-open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 680px) {
      body {
        padding-left: 78px;
        padding-right: 8px;
      }

      body.sidebar-compact {
        padding-left: 78px;
      }

      .layout {
        display: block;
        width: min(100%, 940px);
      }

      .sidebar {
        position: fixed;
        top: max(8px, env(safe-area-inset-top));
        left: 6px;
        z-index: 90;
        display: block;
        width: calc(100vw - 12px);
        height: auto;
        max-height: calc(100vh - max(16px, env(safe-area-inset-top)) - env(safe-area-inset-bottom));
        margin-bottom: 0;
        overflow-y: auto;
      }

      .sidebar::before {
        content: "";
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: 76px;
        z-index: -1;
      }

      .sidebar-swipe-zone {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 89;
        width: 78px;
        background: transparent;
        touch-action: pan-y;
      }

      body:not(.sidebar-compact) .sidebar-swipe-zone {
        width: 100vw;
      }

      .sidebar.is-compact {
        width: 64px;
        padding: 8px 6px;
        font-size: 15px;
      }

      .sidebar.is-compact .side-title {
        display: grid;
        justify-items: center;
        gap: 6px;
        margin-bottom: 8px;
        font-size: 13px;
      }

      .sidebar.is-compact .side-title span {
        max-width: 100%;
        overflow: hidden;
        text-overflow: clip;
        white-space: nowrap;
      }

      .sidebar.is-compact .side-toggle {
        width: 100%;
        min-width: 0;
        height: 28px;
        padding: 0;
        font-size: 12px;
      }

      .sidebar.is-compact .side-actions {
        display: none;
      }

      .record-list {
        gap: 6px;
      }

      .record-pill {
        gap: 4px;
        padding: 7px 8px;
        border-radius: 8px;
      }

      .record-title {
        font-size: 18px;
        padding-right: 30px;
      }

      .logic-badge {
        padding: 1px 5px;
        font-size: 13.5px;
      }

      .record-meta {
        font-size: 15px;
      }

      .record-detail {
        grid-template-columns: repeat(2, 1fr);
        gap: 3px 6px;
        padding-right: 28px;
        font-size: 15px;
        line-height: 1.12;
      }

      .record-line span {
        font-size: 13.5px;
      }

      .record-line strong {
        font-size: 15px;
      }

      .record-actions {
        top: 2px;
        right: 2px;
        gap: 4px;
      }

      .record-delete,
      .record-archive {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        font-size: 19.5px;
      }

      .record-archive {
        font-size: 16px;
      }

      .record-sort {
        right: 2px;
        bottom: 2px;
        gap: 6px;
      }

      .record-sort button {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        font-size: 18px;
      }

      .sidebar.is-compact .record-pill {
        min-height: 58px;
        padding: 5px 4px;
        justify-items: center;
      }

      .sidebar.is-compact .record-title,
      .sidebar.is-compact .record-meta,
      .sidebar.is-compact .record-detail {
        display: none;
      }

      .sidebar.is-compact .record-compact {
        display: grid;
        justify-items: center;
        gap: 3px;
        width: 100%;
        text-align: center;
        font-size: 10px;
        font-weight: 900;
        line-height: 1.1;
      }

      .sidebar.is-compact .record-compact-name {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sidebar.is-compact .record-compact-logic {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .sidebar.is-compact .record-compact-logic.is-breakout {
        background: #ef476f;
      }

      .sidebar.is-compact .record-compact-logic.is-pullback {
        background: #2f6fe4;
      }

      .sidebar.is-compact .record-actions {
        display: none;
      }

      .sidebar.is-compact .record-sort {
        display: none;
      }

      .toolbar {
        position: static;
        width: auto;
        margin: 0 0 10px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        overflow: visible;
      }

      .toolbar button {
        min-width: 0;
        min-height: 34px;
        padding: 0 4px;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
      }

      .meta-grid,
      .calculator {
        grid-template-columns: 1fr;
      }

      .risk-grid {
        grid-template-columns: 1fr 1fr;
      }

      .risk-field {
        min-height: 34px;
        grid-template-columns: 1fr;
        gap: 2px;
        align-content: center;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .risk-field:last-child {
        border-right: 0;
        border-bottom: 0;
      }

      .risk-field label {
        padding-left: 8px;
        font-size: 11px;
      }

      .risk-field input {
        padding: 0 8px 5px;
        font-size: 14px;
      }

      .tag-manager {
        grid-template-columns: 1fr;
      }

      .subpage {
        padding-left: 76px;
        padding-right: 8px;
      }

      .subpage-inner {
        width: 100%;
        margin: 0;
      }

      .subpage-head {
        padding: 12px 10px;
      }

      .tag-manager {
        padding: 10px;
      }

      .meta-field {
        min-height: 36px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .meta-field label {
        padding-left: 8px;
        font-size: 13px;
      }

      .time-stop-toggle {
        min-height: 28px;
        margin-left: 6px;
        padding: 0 8px;
        font-size: 13px;
      }

      .meta-field input,
      .meta-field select {
        padding: 4px 7px;
      }

      .meta-field:last-child {
        border-bottom: 0;
      }

      .dark-panel {
        min-height: auto;
        padding: 5px;
        border-radius: 8px;
      }

      .calculator {
        gap: 5px;
        padding-top: 6px;
      }

      .field-card {
        min-height: 42px;
        margin-bottom: 4px;
        padding: 5px 7px;
      }

      .field-card::before {
        display: none;
      }

      .field-card .label {
        font-size: 12px;
      }

      .field-card input {
        font-size: 19px;
      }

      .field-card .sub {
        font-size: 9px;
      }

      .chip-row {
        min-height: 21px;
        margin-bottom: 4px;
        padding: 2px;
        gap: 4px;
      }

      .chip {
        min-height: 17px;
        padding: 1px 6px;
        font-size: 9px;
      }

      .dynamic-stop {
        gap: 5px;
        margin-bottom: 4px;
        padding: 5px 7px;
      }

      .dynamic-stop-label {
        min-height: 26px;
        padding: 0 8px;
        font-size: 12px;
      }

      .field-card.combo-card {
        min-height: 30px;
        padding-top: 4px;
        padding-bottom: 4px;
        gap: 6px;
      }

      .field-card.combo-card .label {
        font-size: 11px;
      }

      .field-mini input {
        font-size: 15px;
      }

      .field-mini span:not(.label) {
        font-size: 11px;
      }

      .dark-panel.summary {
        min-height: auto;
      }

      .summary-row {
        grid-template-columns: 32px 1fr auto auto;
        gap: 7px;
        padding: 5px 8px;
      }

      .summary-row::before {
        width: 21px;
        height: 21px;
        font-size: 11px;
      }

      .summary-row strong {
        font-size: 15px;
      }

      .matrix {
        display: block;
        border-top: 0;
      }

      .matrix thead,
      .matrix thead tr {
        display: block;
        width: 100%;
      }

      .matrix thead tr {
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr) minmax(0, 1fr);
        border-top: 1px solid var(--line);
      }

      .logic-head {
        display: grid;
        align-items: center;
        text-align: left !important;
        border-bottom: 0;
        width: auto;
        padding: 6px 7px !important;
        font-size: 14px !important;
      }

      .matrix thead th {
        display: block;
        width: auto;
        height: 34px;
        padding: 4px !important;
      }

      .matrix thead th:not(:last-child) {
        border-right: 1px solid var(--line);
      }

      .logic-choice {
        height: 26px;
        border-radius: 7px;
        font-size: 12px;
      }

      .matrix tbody,
      .matrix tr,
      .matrix td,
      .matrix th {
        display: block;
        width: 100%;
      }

      .matrix thead tr {
        display: grid;
      }

      .matrix thead th {
        display: block;
        width: auto;
      }

      .matrix tr {
        border-top: 1px solid var(--line);
      }

      .row-title {
        padding: 6px 8px;
        text-align: left;
        background: #f0f3f8;
        white-space: normal;
        font-size: 15px;
      }

      .row-title span {
        display: inline-block;
      }

      .row-title span::before {
        display: none;
      }

      .matrix td {
        border-right: 0;
      }

      .cell-box {
        min-height: 58px;
        padding: 5px;
      }

      .tag-control select,
      .new-tag input,
      .tag-control button,
      .new-tag button {
        height: 27px;
      }

      .tag-control,
      .new-tag {
        gap: 4px;
        margin-bottom: 5px;
      }

      .tag-control button,
      .new-tag button {
        width: 27px;
        font-size: 17px;
      }

      .tag-list {
        gap: 4px;
        min-height: 24px;
        margin-bottom: 4px;
      }

      .note-tag {
        padding: 3px 6px;
        font-size: 11px;
      }

      .cell-box::before {
        content: "";
        display: block;
        margin: 0;
      }
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .toolbar,
      .sidebar,
      .side-backdrop,
      .toast,
      .tag-control,
      .new-tag,
      .sheet {
        border: 0;
        box-shadow: none;
      }

      .cell-box {
        min-height: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar-swipe-zone" id="sidebarSwipeZone" aria-hidden="true"></div>
  <nav class="toolbar" aria-label="页面操作">
    <button id="newBtn" type="button" class="secondary">新建</button>
    <button id="saveBtn" type="button">保存</button>
    <button id="tagManageBtn" type="button" class="secondary">标签管理</button>
    <button id="copyBtn" type="button" class="secondary">复制文本</button>
    <button id="resetBtn" type="button" class="secondary">清空当前</button>
    <button id="pasteBtn" type="button" class="secondary">粘贴文本</button>
  </nav>

  <div class="side-backdrop" id="sideBackdrop"></div>
  <div class="layout" id="layout">
    <aside class="sidebar" id="sidebar" aria-label="已保存记录">
      <div class="side-title">
        <span>保存记录</span>
        <button id="sidebarToggle" class="side-toggle" type="button">收起</button>
      </div>
      <div class="side-actions" id="recordBackupActions">
        <button id="exportRecordsBtn" type="button">导出</button>
        <button id="importRecordsBtn" type="button">导入</button>
        <button id="archiveViewBtn" type="button" aria-pressed="false">归档</button>
        <input id="importRecordsFile" type="file" accept="application/json,.json" hidden>
      </div>
      <div class="record-list" id="recordList"></div>
    </aside>

    <main class="app">
      <section class="sheet" id="recordSheet">
      <div class="risk-grid" aria-label="风险对比">
        <div class="risk-field" id="singleLossLimitField">
          <label for="singleLossLimit">单笔最大亏损</label>
          <input id="singleLossLimit" data-risk-save="singleLossLimit" type="number" inputmode="decimal" step="0.01" placeholder="0">
        </div>
        <div class="risk-field" id="globalLossLimitField">
          <label for="globalLossLimit">全局最大亏损</label>
          <input id="globalLossLimit" data-risk-save="globalLossLimit" type="number" inputmode="decimal" step="0.01" placeholder="0">
        </div>
      </div>
      <div class="meta-grid">
        <div class="meta-field">
          <label for="symbol">标的名称:</label>
          <input id="symbol" data-save="symbol" type="text" placeholder="例如 AAPL / BTC">
        </div>
        <div class="meta-field">
          <label for="buyTime">买入时间:</label>
          <input id="buyTime" data-save="buyTime" type="date">
        </div>
        <div class="meta-field full-row" id="timeStopField">
          <button id="timeStopToggle" class="time-stop-toggle" type="button" aria-pressed="true">时间止损</button>
          <select id="timeStopDays" data-save="timeStopDays" aria-label="时间止损天数"></select>
        </div>
      </div>

      <div class="calculator">
        <section class="dark-panel" aria-label="入场与止损">
          <label class="field-card" data-icon="入">
            <span class="label">入场单价</span>
            <input id="entryPrice" data-save="entryPrice" type="number" inputmode="decimal" step="0.001" value="10">
          </label>
          <div class="chip-row" aria-label="止损快捷比例">
            <button class="chip" type="button" data-loss="0.05">15% / -5%</button>
            <button class="chip" type="button" data-loss="0.03">10% / -3%</button>
            <button class="chip" type="button" data-loss="0.003">0.8% / -0.3%</button>
          </div>
          <label class="field-card" data-icon="止">
            <span class="label">止损单价 <small id="lossMeta">-1.0000 （-10%）</small></span>
            <input id="stopPrice" data-save="stopPrice" type="number" inputmode="decimal" step="0.001" value="9">
          </label>
          <div class="dynamic-stop" id="dynamicStopControl" aria-label="&#21160;&#24577;&#27490;&#25439;">
            <div class="dynamic-stop-head">
              <button id="dynamicStopToggle" class="dynamic-stop-label" type="button" aria-pressed="true">&#21160;&#24577;&#27490;&#25439;</button>
            </div>
            <div class="dynamic-stop-body" id="dynamicStopBody">
              <div class="tag-control">
                <select id="dynamicStopSelect" aria-label="&#21160;&#24577;&#27490;&#25439;&#36873;&#39033;"></select>
                <button type="button" id="dynamicStopOpenAdd" aria-label="&#28155;&#21152;&#21160;&#24577;&#27490;&#25439;">+</button>
              </div>
              <div class="new-tag" id="dynamicStopNewTag">
                <input id="dynamicStopInput" type="text" placeholder="&#36755;&#20837;&#21160;&#24577;&#27490;&#25439;">
                <button type="button" id="dynamicStopSaveTag" aria-label="&#20445;&#23384;&#21160;&#24577;&#27490;&#25439;">&#10003;</button>
              </div>
              <div class="tag-list" id="dynamicStopList"></div>
            </div>
          </div>
          <div class="chip-row" aria-label="盈亏比快捷选择">
            <button class="chip" type="button" data-ratio="3">3 : 1</button>
            <button class="chip" type="button" data-ratio="2.8">2.8 : 1</button>
            <button class="chip" type="button" data-ratio="2.5">2.5 : 1</button>
            <button class="chip" type="button" data-ratio="2.2">2.2 : 1</button>
            <button class="chip" type="button" data-ratio="2">2 : 1</button>
          </div>
        </section>

        <section class="dark-panel" aria-label="目标与金额">
          <label class="field-card" data-icon="目">
            <span class="label">目标单价 <small id="profitMeta">2.5000 （+25%）</small></span>
            <input id="targetPrice" data-save="targetPrice" type="number" inputmode="decimal" step="0.001" value="12.5">
          </label>
          <div class="field-card combo-card" data-icon="额">
            <label class="field-mini">
              <span class="label">交易数量</span>
              <input id="quantity" data-save="quantity" type="number" inputmode="decimal" step="1" value="100">
            </label>
            <label class="field-mini">
              <span class="label">入场总金额</span>
              <input id="entryAmount" data-save="entryAmount" type="number" inputmode="decimal" step="0.01" value="1000">
            </label>
          </div>
        </section>

        <section class="dark-panel summary" aria-label="计算结果">
          <div class="summary-row" data-icon="比">
            <span>盈亏比</span>
            <strong id="ratioText">2.50 : 1</strong>
          </div>
          <div class="summary-row" data-icon="盈">
            <span>目标利润</span>
            <strong id="profitAmount">250.00 元</strong>
            <small id="profitPercent">+25%</small>
          </div>
          <div class="summary-row" id="lossSummaryRow" data-icon="亏">
            <span>预计亏损</span>
            <strong id="lossAmount">-100.00 元</strong>
            <small id="lossPercent">-10%</small>
          </div>
          <div class="summary-row" data-icon="目">
            <span>目标总金额</span>
            <strong id="targetAmount">1,250.00 元</strong>
          </div>
          <div class="summary-row" data-icon="止">
            <span>止损总金额</span>
            <strong id="stopAmount">900.00 元</strong>
          </div>
        </section>
      </div>

      <table class="matrix" id="recordMatrix" aria-label="交易依据记录表">
        <thead>
          <tr>
            <th class="logic-head">逻辑</th>
            <th class="breakout-col">
              <button class="logic-choice" type="button" data-logic-choice="breakout">形态突破</button>
            </th>
            <th class="pullback-col">
              <button class="logic-choice" type="button" data-logic-choice="pullback">回调反弹</button>
            </th>
          </tr>
        </thead>
        <tbody id="matrixBody"></tbody>
      </table>
      </section>
    </main>
  </div>

  <section class="subpage" id="tagPage" aria-label="标签管理">
    <div class="subpage-inner">
      <header class="subpage-head">
        <h2>标签管理</h2>
        <button id="closeTagPageBtn" type="button" aria-label="关闭标签管理">×</button>
      </header>
      <div class="tag-manager" id="tagManager"></div>
    </div>
  </section>

  <section class="subpage" id="pastePage" aria-label="粘贴文本">
    <div class="subpage-inner">
      <header class="subpage-head">
        <h2>粘贴文本</h2>
        <button id="closePastePageBtn" type="button" aria-label="关闭粘贴文本">×</button>
      </header>
      <div class="paste-panel">
        <textarea id="pasteTextArea" placeholder="在这里粘贴复制文本"></textarea>
        <div class="paste-actions">
          <button id="cancelPasteBtn" type="button">取消</button>
          <button id="applyPasteBtn" type="button">填充</button>
        </div>
      </div>
    </div>
  </section>

  <section class="subpage" id="archivePage" aria-label="归档记录">
    <div class="subpage-inner">
      <header class="subpage-head">
        <h2>归档记录</h2>
        <button id="closeArchivePageBtn" type="button" aria-label="关闭归档记录">×</button>
      </header>
      <div class="archive-form">
        <label>
          <span>结果</span>
          <select id="archiveResult">
            <option value="win">赢</option>
            <option value="loss">输</option>
          </select>
        </label>
        <label>
          <span>卖出价格</span>
          <input id="archiveSellPrice" type="number" inputmode="decimal" step="0.001" placeholder="输入卖出价格">
        </label>
        <div class="paste-actions">
          <button id="cancelArchiveBtn" type="button">取消</button>
          <button id="applyArchiveBtn" type="button">归档</button>
        </div>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";

      var storageKey = "trade-record-generator-v2";
      var legacyStorageKey = "trade-record-generator-v1";
      var rows = [
        { id: "momentum", label: "\u52a8\u80fd\u4f9d\u636e" },
        { id: "support", label: "\u652f\u6491\u5f62\u6001" },
        { id: "pressure", label: "\u538b\u529b\u5f62\u6001" }
      ];
      var cols = [
        { id: "breakout", label: "形态突破" },
        { id: "pullback", label: "回调反弹" }
      ];
      var extraTagRows = [
        { id: "dynamicStop", label: "\u52a8\u6001\u6b62\u635f", icon: "\u52a8" }
      ];
      var tagRows = rows.concat(extraTagRows);
      var state = {
        currentId: null,
        records: [],
        tagLibrary: createEmptyTagLibrary(),
        showArchived: false,
        riskSettings: createDefaultRiskSettings()
      };

      var els = {};
      var pendingArchiveId = null;

      function $(id) {
        return document.getElementById(id);
      }

      function numberValue(id) {
        var value = parseFloat($(id).value);
        return Number.isFinite(value) ? value : 0;
      }

      function createDefaultRiskSettings() {
        return {
          singleLossLimit: "",
          globalLossLimit: ""
        };
      }

      function money(value) {
        return value.toLocaleString("zh-CN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }) + " 元";
      }

      function signedPercent(value) {
        if (!Number.isFinite(value)) return "0%";
        var sign = value > 0 ? "+" : "";
        return sign + (value * 100).toFixed(2).replace(/\.?0+$/, "") + "%";
      }

      function signedFixed(value) {
        var sign = value > 0 ? "+" : "";
        return sign + value.toFixed(4);
      }

      function normalizeRiskSettings(settings) {
        var defaults = createDefaultRiskSettings();
        if (!settings || typeof settings !== "object") return defaults;
        return {
          singleLossLimit: settings.singleLossLimit !== undefined ? String(settings.singleLossLimit) : defaults.singleLossLimit,
          globalLossLimit: settings.globalLossLimit !== undefined ? String(settings.globalLossLimit) : defaults.globalLossLimit
        };
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("is-open");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () {
          els.toast.classList.remove("is-open");
        }, 1600);
      }

      function getCellKey(rowId, colId) {
        return rowId + "__" + colId;
      }

      function createEmptyTagLibrary() {
        return tagRows.reduce(function (library, row) {
          library[row.id] = [];
          return library;
        }, {});
      }

      function nowInputValue() {
        var now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        return now.toISOString().slice(0, 16);
      }

      function createDefaultFields() {
        return {
          symbol: "",
          buyTime: nowInputValue().slice(0, 10),
          timeStopEnabled: "1",
          timeStopDays: "7",
          dynamicStopEnabled: "1",
          entryPrice: "10",
          stopPrice: "9",
          targetPrice: "12.5",
          quantity: "100",
          entryAmount: "1000"
        };
      }

      function createRecord(fields, cells) {
        var id = "record-" + Date.now() + "-" + Math.random().toString(16).slice(2);
        return {
          id: id,
          fields: fields || createDefaultFields(),
          cells: cells || {},
          dynamicStopTags: [],
          archived: false,
          archiveInfo: null,
          selectedLogic: "breakout",
          updatedAt: new Date().toISOString()
        };
      }

      function activeRecord() {
        var record = state.records.find(function (item) {
          return item.id === state.currentId;
        });
        if (!record) {
          record = createRecord();
          state.records.unshift(record);
          state.currentId = record.id;
        }
        if (!record.fields) record.fields = createDefaultFields();
        if (!record.cells) record.cells = {};
        if (!Array.isArray(record.dynamicStopTags)) record.dynamicStopTags = [];
        record.archived = record.archived === true;
        if (record.archiveInfo && typeof record.archiveInfo !== "object") record.archiveInfo = null;
        if (!record.selectedLogic) record.selectedLogic = "breakout";
        return record;
      }

      function ensureCell(key) {
        var record = activeRecord();
        if (!record.cells[key]) {
          record.cells[key] = { tags: [] };
        }
        return record.cells[key];
      }

      function normalizeTagLibrary(library) {
        var normalized = createEmptyTagLibrary();
        if (Array.isArray(library)) return normalized;
        tagRows.forEach(function (row) {
          if (library && Array.isArray(library[row.id])) {
            normalized[row.id] = library[row.id].filter(Boolean);
          }
        });
        return normalized;
      }

      function readStorage() {
        try {
          var saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (saved && Array.isArray(saved.records)) {
            state.currentId = saved.currentId || null;
            state.records = saved.records.length ? saved.records : [createRecord()];
            state.tagLibrary = normalizeTagLibrary(saved.tagLibrary);
            state.showArchived = saved.showArchived === true;
            state.riskSettings = normalizeRiskSettings(saved.riskSettings);
          } else {
            var legacy = JSON.parse(localStorage.getItem(legacyStorageKey) || "null");
            if (legacy) {
              state.records = [createRecord(legacy.fields || createDefaultFields(), legacy.cells || {})];
              state.currentId = state.records[0].id;
              state.tagLibrary = createEmptyTagLibrary();
              state.showArchived = false;
              state.riskSettings = createDefaultRiskSettings();
            }
          }
        } catch (error) {
          state = {
            currentId: null,
            records: [],
            tagLibrary: createEmptyTagLibrary(),
            showArchived: false,
            riskSettings: createDefaultRiskSettings()
          };
        }
        state.riskSettings = normalizeRiskSettings(state.riskSettings);
        activeRecord();
      }

      function writeStorage(silent) {
        var record = activeRecord();
        document.querySelectorAll("[data-save]").forEach(function (input) {
          record.fields[input.id] = input.value;
        });
        document.querySelectorAll("[data-risk-save]").forEach(function (input) {
          state.riskSettings[input.id] = input.value;
        });
        record.fields.timeStopEnabled = $("timeStopToggle").getAttribute("aria-pressed") === "true" ? "1" : "0";
        record.fields.dynamicStopEnabled = $("dynamicStopToggle").getAttribute("aria-pressed") === "true" ? "1" : "0";
        record.updatedAt = new Date().toISOString();
        localStorage.setItem(storageKey, JSON.stringify(state));
        renderRecords();
        if (!silent) showToast("已保存到本机");
      }

      function normalizeImportedRecord(record, index) {
        var normalized = createRecord();
        var fields = record && record.fields && typeof record.fields === "object" ? record.fields : {};
        normalized.id = record && record.id ? String(record.id) : "imported-" + Date.now() + "-" + index;
        normalized.fields = Object.assign(createDefaultFields(), fields);
        normalized.cells = {};
        normalized.dynamicStopTags = Array.isArray(record && record.dynamicStopTags)
          ? record.dynamicStopTags.filter(Boolean).map(String)
          : [];
        normalized.archived = record && record.archived === true;
        normalized.archiveInfo = record && record.archiveInfo && typeof record.archiveInfo === "object" ? {
          result: record.archiveInfo.result === "loss" ? "loss" : "win",
          sellPrice: String(record.archiveInfo.sellPrice || ""),
          archivedAt: record.archiveInfo.archivedAt ? String(record.archiveInfo.archivedAt) : ""
        } : null;
        normalized.selectedLogic = record && record.selectedLogic === "pullback" ? "pullback" : "breakout";
        normalized.updatedAt = record && record.updatedAt ? String(record.updatedAt) : new Date().toISOString();

        if (record && record.cells && typeof record.cells === "object") {
          Object.keys(record.cells).forEach(function (key) {
            var cell = record.cells[key];
            normalized.cells[key] = {
              tags: cell && Array.isArray(cell.tags) ? cell.tags.filter(Boolean).map(String) : []
            };
          });
        }
        return normalized;
      }

      function normalizeBackupPayload(payload) {
        var source = payload && payload.state ? payload.state : payload;
        if (!source || !Array.isArray(source.records)) {
          throw new Error("Invalid backup");
        }
        var importedRecords = source.records.map(normalizeImportedRecord);
        if (!importedRecords.length) importedRecords = [createRecord()];
        return {
          currentId: source.currentId && importedRecords.some(function (record) {
            return record.id === source.currentId;
          }) ? source.currentId : importedRecords[0].id,
          records: importedRecords,
          tagLibrary: normalizeTagLibrary(source.tagLibrary),
          showArchived: source.showArchived === true,
          riskSettings: normalizeRiskSettings(source.riskSettings)
        };
      }

      function refreshAfterBackupImport() {
        hydrateFields();
        renderDynamicStopTags();
        renderMatrix();
        recalc();
        renderRecords();
        renderTagManager();
        updateLogicView();
      }

      function exportRecords() {
        writeStorage(true);
        var backup = {
          app: "trade-record-pwa",
          version: 3,
          exportedAt: new Date().toISOString(),
          state: {
            currentId: state.currentId,
            records: state.records,
            tagLibrary: state.tagLibrary,
            showArchived: state.showArchived,
            riskSettings: state.riskSettings
          }
        };
        var blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        var date = new Date().toISOString().slice(0, 10);
        link.href = url;
        link.download = "trade-record-backup-" + date + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 1000);
        showToast("\u5df2\u5bfc\u51faJSON\u5907\u4efd");
      }

      function importRecordsFile(file) {
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var nextState = normalizeBackupPayload(JSON.parse(String(reader.result || "")));
            if (!window.confirm("\u5bfc\u5165\u4f1a\u66ff\u6362\u5f53\u524d\u5168\u90e8\u4fdd\u5b58\u8bb0\u5f55\uff0c\u786e\u8ba4\u7ee7\u7eed\uff1f")) return;
            state = nextState;
            localStorage.setItem(storageKey, JSON.stringify(state));
            refreshAfterBackupImport();
            showToast("\u5df2\u5bfc\u5165\u5907\u4efd");
          } catch (error) {
            showToast("\u5bfc\u5165\u5931\u8d25\uff1aJSON\u683c\u5f0f\u4e0d\u6b63\u786e");
          }
        };
        reader.readAsText(file);
      }

      function populateTimeStopOptions() {
        var timeStop = $("timeStopDays");
        if (!timeStop || timeStop.options.length) return;
        for (var day = 1; day <= 31; day += 1) {
          var option = document.createElement("option");
          option.value = String(day);
          option.textContent = day + " 天";
          timeStop.appendChild(option);
        }
      }

      function setTimeStopEnabled(enabled, silent) {
        var field = $("timeStopField");
        var toggle = $("timeStopToggle");
        var select = $("timeStopDays");
        if (!field || !toggle || !select) return;
        field.classList.toggle("is-disabled", !enabled);
        toggle.setAttribute("aria-pressed", enabled ? "true" : "false");
        select.disabled = !enabled;
        if (!silent) {
          activeRecord().fields.timeStopEnabled = enabled ? "1" : "0";
          writeStorage(true);
          renderRecords();
        }
      }

      function setDynamicStopEnabled(enabled, silent) {
        var control = $("dynamicStopControl");
        var toggle = $("dynamicStopToggle");
        if (!control || !toggle) return;
        control.classList.toggle("is-disabled", !enabled);
        toggle.setAttribute("aria-pressed", enabled ? "true" : "false");
        if (!silent) {
          activeRecord().fields.dynamicStopEnabled = enabled ? "1" : "0";
          writeStorage(true);
          renderRecords();
        }
      }

      function hydrateFields() {
        populateTimeStopOptions();
        var fields = activeRecord().fields;
        document.querySelectorAll("[data-risk-save]").forEach(function (input) {
          input.value = state.riskSettings && state.riskSettings[input.id] !== undefined ? state.riskSettings[input.id] : "";
        });
        document.querySelectorAll("[data-save]").forEach(function (input) {
          if (fields[input.id] !== undefined) {
            input.value = input.id === "buyTime" ? String(fields[input.id]).slice(0, 10) : fields[input.id];
          } else if (createDefaultFields()[input.id] !== undefined) {
            input.value = createDefaultFields()[input.id];
          }
        });

        if (!$("buyTime").value) {
          $("buyTime").value = nowInputValue().slice(0, 10);
        }
        setTimeStopEnabled(fields.timeStopEnabled !== "0", true);
        setDynamicStopEnabled(fields.dynamicStopEnabled !== "0", true);
      }

      function getRecordTitle(record) {
        var symbol = (record.fields && record.fields.symbol || "").trim();
        var time = record.fields && record.fields.buyTime
          ? record.fields.buyTime.slice(5, 16).replace("T", " ")
          : "";
        return (symbol || "未命名记录") + (time ? " · " + time : "");
      }

      function parseRecordNumber(record, id) {
        var value = parseFloat(record.fields && record.fields[id]);
        return Number.isFinite(value) ? value : 0;
      }

      function recordExpectedLoss(record) {
        var entry = parseRecordNumber(record, "entryPrice");
        var stop = parseRecordNumber(record, "stopPrice");
        var quantity = parseRecordNumber(record, "quantity");
        var loss = (stop - entry) * quantity;
        return loss < 0 ? Math.abs(loss) : 0;
      }

      function formatRecordValue(value, digits) {
        if (!Number.isFinite(value)) return "-";
        return value.toLocaleString("zh-CN", {
          minimumFractionDigits: 0,
          maximumFractionDigits: digits
        });
      }

      function holdingDaysFrom(value) {
        if (!value) return "-";
        var start = new Date(value);
        if (Number.isNaN(start.getTime())) return "-";
        var startDate = new Date(start.getFullYear(), start.getMonth(), start.getDate());
        var now = new Date();
        var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        var days = Math.floor((today - startDate) / 86400000);
        return Math.max(0, days) + " 天";
      }

      function getRecordSummary(record) {
        var fields = record.fields || {};
        var logicId = record.selectedLogic || "breakout";
        var entry = parseRecordNumber(record, "entryPrice");
        var stop = parseRecordNumber(record, "stopPrice");
        var target = parseRecordNumber(record, "targetPrice");
        var quantity = parseRecordNumber(record, "quantity");
        var amount = parseRecordNumber(record, "entryAmount");
        var risk = Math.abs(entry - stop);
        var reward = Math.abs(target - entry);
        var ratio = risk > 0 ? reward / risk : 0;
        var expectedLoss = recordExpectedLoss(record);
        var singleLimit = parseFloat(state.riskSettings && state.riskSettings.singleLossLimit);
        return {
          title: (fields.symbol || "未命名记录").trim() || "未命名记录",
          time: fields.buyTime ? fields.buyTime.replace("T", " ") : "未设置时间",
          entry: formatRecordValue(entry, 4),
          target: formatRecordValue(target, 4),
          stop: formatRecordValue(stop, 4),
          quantity: formatRecordValue(quantity, 4),
          amount: formatRecordValue(amount, 2),
          ratio: ratio > 0 ? ratio.toFixed(2) + " : 1" : "-",
          expectedLoss: expectedLoss,
          lossRiskExceeded: Number.isFinite(singleLimit) && singleLimit > 0 && expectedLoss > singleLimit,
          logic: getLogicLabel(logicId),
          logicId: logicId,
          dynamicStop: fields.dynamicStopEnabled === "0" ? "\u672a\u542f\u7528" : ((record.dynamicStopTags || []).join(" / ") || "-"),
          archiveInfo: record.archiveInfo || null,
          archiveText: record.archiveInfo ? ((record.archiveInfo.result === "loss" ? "\u8f93" : "\u8d62") + " / " + record.archiveInfo.sellPrice) : "-",
          timeStopDays: fields.timeStopEnabled === "0" ? "\u672a\u542f\u7528" : (fields.timeStopDays || "7") + " 天",
          holdingDays: holdingDaysFrom(fields.buyTime)
        };
      }

      function compactTitle(title) {
        var text = String(title || "未命名").trim();
        if (text.length <= 4) return text;
        return text.slice(0, 4);
      }

      function renderRecords() {
        var list = $("recordList");
        if (!list) return;
        var visibleRecords = state.records.filter(function (record) {
          return state.showArchived ? record.archived === true : record.archived !== true;
        });
        var archiveButton = $("archiveViewBtn");
        if (archiveButton) {
          archiveButton.classList.toggle("is-active", state.showArchived);
          archiveButton.setAttribute("aria-pressed", state.showArchived ? "true" : "false");
          archiveButton.textContent = state.showArchived ? "\u8fd4\u56de" : "\u5f52\u6863";
        }
        if (!visibleRecords.length) {
          list.innerHTML = '<div class="empty-records">' + (state.showArchived ? "\u6682\u65e0\u5f52\u6863\u8bb0\u5f55" : "\u8fd8\u6ca1\u6709\u4fdd\u5b58\u8bb0\u5f55") + '</div>';
          return;
        }
        list.innerHTML = visibleRecords.map(function (record, index) {
          var active = record.id === state.currentId ? " is-active" : "";
          var summary = getRecordSummary(record);
          var logicClass = summary.logicId === "pullback" ? "is-pullback" : "is-breakout";
          var isFirst = index === 0;
          var isLast = index === visibleRecords.length - 1;
          var archivedClass = record.archived ? " is-archived" : "";
          return '<div class="record-pill ' + logicClass + active + archivedClass + '" data-record-id="' + record.id + '" role="button" tabindex="0">' +
            '<span class="record-sort" aria-label="\u8bb0\u5f55\u6392\u5e8f">' +
              '<button type="button" class="' + (isFirst ? "is-highlight" : "") + '" data-sort-record="' + record.id + '" data-sort-action="top" aria-label="\u7f6e\u9876">\u21e7</button>' +
              '<button type="button" data-sort-record="' + record.id + '" data-sort-action="up" aria-label="\u4e0a\u79fb"' + (isFirst ? " hidden" : "") + '>\u2191</button>' +
              '<button type="button" data-sort-record="' + record.id + '" data-sort-action="down" aria-label="\u4e0b\u79fb"' + (isLast ? " hidden" : "") + '>\u2193</button>' +
            '</span>' +
            '<span class="record-actions">' +
              '<button type="button" class="record-archive" data-archive-record="' + record.id + '" aria-label="' + (record.archived ? "\u8fd8\u539f\u8bb0\u5f55" : "\u5f52\u6863\u8bb0\u5f55") + '">' + (record.archived ? "\u8fd8" : "\u5f52") + '</button>' +
              '<button type="button" class="record-delete" data-delete-record="' + record.id + '" aria-label="\u5220\u9664\u8bb0\u5f55">&times;</button>' +
            '</span>' +
            '<span class="record-title">' +
              '<span class="record-name">' + escapeHtml(summary.title) + '</span>' +
              '<span class="logic-badge ' + logicClass + '">' + escapeHtml(summary.logic) + '</span>' +
            '</span>' +
            '<span class="record-meta">' + escapeHtml(summary.time) + '</span>' +
            '<span class="record-detail">' +
              '<span class="record-line"><span>\u5165\u573a</span><strong>' + escapeHtml(summary.entry) + '</strong></span>' +
              '<span class="record-line"><span>\u76ee\u6807</span><strong>' + escapeHtml(summary.target) + '</strong></span>' +

      function renderTagManager() {

      function updateRiskComparison(currentLoss) {
        var singleLimit = parseFloat(state.riskSettings && state.riskSettings.singleLossLimit);
        var globalLimit = parseFloat(state.riskSettings && state.riskSettings.globalLossLimit);
        var currentExpectedLoss = Math.max(0, Math.abs(currentLoss || 0));
        var singleExceeded = Number.isFinite(singleLimit) && singleLimit > 0 && currentExpectedLoss > singleLimit;
        var currentId = state.currentId;
        var totalExpectedLoss = state.records.reduce(function (total, record) {
          if (record.archived === true) return total;
          return total + (record.id === currentId ? currentExpectedLoss : recordExpectedLoss(record));
        }, 0);
        var globalExceeded = Number.isFinite(globalLimit) && globalLimit > 0 && totalExpectedLoss > globalLimit;
        $("lossSummaryRow").classList.toggle("is-risk-warning", singleExceeded);
        $("globalLossLimitField").classList.toggle("is-warning", globalExceeded);
      }

        renderTagManager();
        $("tagPage").classList.add("is-open");
      }

      function closeTagPage() {
        $("tagPage").classList.remove("is-open");
      }

      function renderDynamicStopOptions() {
        var tags = state.tagLibrary.dynamicStop || [];
        return '<option value="">' + (tags.length ? "\u9009\u62e9\u52a8\u6001\u6b62\u635f" : "\u5148\u6dfb\u52a0\u52a8\u6001\u6b62\u635f") + '</option>' + tags.map(function (tag) {
          return '<option value="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</option>';
        }).join("");
      }

      function renderDynamicStopTags() {
        var record = activeRecord();
        var select = $("dynamicStopSelect");
        var list = $("dynamicStopList");
        if (!select || !list) return;
        if (!state.tagLibrary.dynamicStop) state.tagLibrary.dynamicStop = [];
        if (!Array.isArray(record.dynamicStopTags)) record.dynamicStopTags = [];
        select.innerHTML = renderDynamicStopOptions();
        select.value = "";
        list.innerHTML = record.dynamicStopTags.map(function (tag, index) {
          return '<span class="note-tag">' + escapeHtml(tag) +
            '<button type="button" data-index="' + index + '" aria-label="\u5220\u9664\u52a8\u6001\u6b62\u635f">&times;</button></span>';
        }).join("");
      }

      function addDynamicStopTag(value) {
        var tag = value.trim();
        if (!tag) return;
        var record = activeRecord();
        if (!state.tagLibrary.dynamicStop) state.tagLibrary.dynamicStop = [];
        if (state.tagLibrary.dynamicStop.indexOf(tag) === -1) {
          state.tagLibrary.dynamicStop.push(tag);
        }
        if (record.dynamicStopTags.indexOf(tag) === -1) {
          record.dynamicStopTags.push(tag);
        }
        writeStorage(true);
        renderDynamicStopTags();
        renderTagManager();
      }

      function bindDynamicStopTags() {
        var select = $("dynamicStopSelect");
        var openAdd = $("dynamicStopOpenAdd");
        var newTagWrap = $("dynamicStopNewTag");
        var input = $("dynamicStopInput");
        var save = $("dynamicStopSaveTag");
        var list = $("dynamicStopList");
        if (!select || !openAdd || !newTagWrap || !input || !save || !list) return;

        select.addEventListener("change", function () {
          if (select.value) addDynamicStopTag(select.value);
        });

        openAdd.addEventListener("click", function () {
          newTagWrap.classList.toggle("is-open");
          if (newTagWrap.classList.contains("is-open")) input.focus();
        });

        save.addEventListener("click", function () {
          addDynamicStopTag(input.value);
          input.value = "";
          newTagWrap.classList.remove("is-open");
        });

        input.addEventListener("keydown", function (event) {
          if (event.key !== "Enter") return;
          addDynamicStopTag(input.value);
          input.value = "";
          newTagWrap.classList.remove("is-open");
        });

        list.addEventListener("click", function (event) {
          if (!event.target.matches("button")) return;
          var record = activeRecord();
          record.dynamicStopTags.splice(parseInt(event.target.dataset.index, 10), 1);
          writeStorage(true);
          renderDynamicStopTags();
        });
      }

      function addManagedTag(rowId, value) {
        var tag = value.trim();
        if (!tag) return;
        if (!state.tagLibrary[rowId]) state.tagLibrary[rowId] = [];
        if (state.tagLibrary[rowId].indexOf(tag) === -1) {
          state.tagLibrary[rowId].push(tag);
        }
        writeStorage(true);
        refreshSelects();
        renderDynamicStopTags();
        renderTagManager();
      }

      function deleteManagedTag(rowId, tag) {
        if (!window.confirm("确认删除标签“" + tag + "”？已使用的位置也会移除。")) return;
        state.tagLibrary[rowId] = (state.tagLibrary[rowId] || []).filter(function (item) {
          return item !== tag;
        });
        if (rowId === "dynamicStop") {
          state.records.forEach(function (record) {
            record.dynamicStopTags = (record.dynamicStopTags || []).filter(function (item) {
              return item !== tag;
            });
          });
        } else {
          state.records.forEach(function (record) {
            cols.forEach(function (col) {
              var key = getCellKey(rowId, col.id);
              if (record.cells && record.cells[key] && Array.isArray(record.cells[key].tags)) {
                record.cells[key].tags = record.cells[key].tags.filter(function (item) {
                  return item !== tag;
                });
              }
            });
          });
        }
        writeStorage(true);
        renderMatrix();
        renderDynamicStopTags();
        renderTagManager();
        showToast("标签已删除");
      }

      function loadRecord(id) {
        writeStorage(true);
        state.currentId = id;

      function renderMatrix() {
        var html = rows.map(function (row) {

      function refreshSelects() {

          var current = select.value;
          var rowId = select.closest(".cell-box").dataset.row;
          select.innerHTML = renderOptions(rowId);
          select.value = current;
        });
