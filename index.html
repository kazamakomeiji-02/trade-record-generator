<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f6fe4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="交易记录生成器">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>交易记录生成器</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f6f9fd;
      --ink: #14213d;
      --muted: #687795;
      --line: #e2e8f2;
      --panel: #172a4b;
      --field: rgba(255, 255, 255, 0.08);
      --field-soft: rgba(255, 255, 255, 0.11);
      --accent: #2f6fe4;
      --accent-soft: #eaf2ff;
      --side: rgba(255, 255, 255, 0.82);
      --good: #34b685;
      --bad: #ef476f;
      --paper: #ffffff;
      --shadow: 0 18px 42px rgba(27, 55, 104, 0.12);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 16% 0%, rgba(73, 132, 246, 0.14), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--page) 100%);
      color: var(--ink);
    }

    body {
      padding: max(12px, env(safe-area-inset-top)) 10px max(24px, env(safe-area-inset-bottom));
      font-size: 15px;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(100%, 940px);
      margin: 0 auto;
    }

    .layout {
      display: grid;
      grid-template-columns: 244px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      width: min(100%, 1180px);
      margin: 0 auto;
    }

    .side-backdrop {
      display: none;
    }

    .sidebar {
      position: sticky;
      top: max(12px, env(safe-area-inset-top));
      height: calc(100vh - 24px - env(safe-area-inset-top));
      padding: 12px;
      border: 1px solid rgba(199, 211, 229, 0.72);
      border-radius: 12px;
      background: var(--side);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .side-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 900;
      color: var(--ink);
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-content: flex-start;
    }

    .record-pill {
      position: relative;
      display: grid;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      min-height: 34px;
      padding: 10px;
      border: 1px solid #d6e0ef;
      border-radius: 10px;
      background: #fff;
      color: #304052;
      text-align: left;
      overflow: hidden;
      cursor: pointer;
    }

    .record-pill.is-active {
      border-color: #2f6fe4;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
      box-shadow: 0 8px 18px rgba(47, 111, 228, 0.28);
    }

    .record-pill.is-breakout {
      border-color: #ffd2dc;
      background: linear-gradient(180deg, #fff8fa, #fff0f4);
    }

    .record-pill.is-pullback {
      border-color: #cfe0ff;
      background: linear-gradient(180deg, #f8fbff, #eef5ff);
    }

    .record-pill.is-breakout.is-active {
      border-color: #ef476f;
      background: linear-gradient(180deg, #ff6b8a, #d9234e);
      box-shadow: 0 8px 18px rgba(217, 35, 78, 0.28);
    }

    .record-pill.is-pullback.is-active {
      border-color: #2f6fe4;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      box-shadow: 0 8px 18px rgba(47, 111, 228, 0.28);
    }

    .record-title {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-right: 28px;
      min-width: 0;
      overflow: hidden;
      font-size: 14px;
      font-weight: 900;
    }

    .record-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logic-badge {
      flex: 0 0 auto;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      line-height: 1.25;
    }

    .logic-badge.is-breakout {
      background: #fff1f3;
      color: #d9234e;
    }

    .logic-badge.is-pullback {
      background: #eaf2ff;
      color: #2f6fe4;
    }

    .record-pill.is-active .logic-badge.is-breakout {
      background: rgba(255, 255, 255, 0.22);
      color: #ffd9e1;
    }

    .record-pill.is-active .logic-badge.is-pullback {
      background: rgba(255, 255, 255, 0.22);
      color: #d8e7ff;
    }

    .record-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .record-pill.is-active .record-meta,
    .record-pill.is-active .record-line span,
    .record-pill.is-active .record-detail {
      color: rgba(255, 255, 255, 0.82);
    }

    .record-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 10px;
      color: #2c3f5f;
      font-size: 12px;
      line-height: 1.25;
    }

    .record-line {
      min-width: 0;
    }

    .record-line span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .record-line strong {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 900;
    }

    .record-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      z-index: 4;
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: #fff1f4;
      color: #bd284d;
      border: 1px solid #ffd3dd;
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      touch-action: manipulation;
    }

    .record-pill.is-active .record-delete {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.24);
      color: #fff;
    }

    .empty-records {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toolbar {
      position: static;
      width: min(calc(100% - 20px), 1180px);
      margin: 0 auto 12px;
      display: flex;
      gap: 8px;
      padding: 8px 0 12px;
      background: linear-gradient(180deg, rgba(246, 249, 253, 0.96) 78%, rgba(246, 249, 253, 0));
    }

    .toolbar button {
      min-height: 40px;
      padding: 0 12px;
      border-radius: 8px;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
      font-weight: 700;
      white-space: nowrap;
    }

    .toolbar .secondary {
      background: rgba(255, 255, 255, 0.9);
      color: var(--ink);
      border: 1px solid #d4d9e2;
    }

    .sheet {
      background: var(--paper);
      border: 1px solid rgba(217, 225, 234, 0.8);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
    }

    .meta-field {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      min-height: 52px;
      border-right: 1px solid var(--line);
    }

    .meta-field:last-child {
      border-right: 0;
    }

    .meta-field label {
      padding-left: 16px;
      font-weight: 800;
      white-space: nowrap;
    }

    .meta-field input,
    .meta-field select {
      width: 100%;
      min-width: 0;
      border: 0;
      background: transparent;
      padding: 8px 12px;
      font-weight: 700;
      color: var(--ink);
      outline: 0;
    }

    .calculator {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 0 0;
    }

    .dark-panel {
      min-height: 176px;
      padding: 12px;
      border-radius: 10px;
      background:
        radial-gradient(circle at 14% 8%, rgba(80, 132, 245, 0.3), transparent 32%),
        linear-gradient(145deg, #223d70, #0f213e 72%);
      color: #d7dde5;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 14px 28px rgba(17, 35, 66, 0.14);
    }

    .dark-panel.summary {
      grid-column: 1 / -1;
      min-height: 172px;
      display: grid;
      align-content: stretch;
      gap: 0;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
    }

    .field-card {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      min-height: 76px;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 8px;
      background: var(--field);
      color: #e6eefb;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .field-card::before {
      content: attr(data-icon);
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(180deg, #5e95ff, #2f6fe4);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
    }

    .field-card input {
      grid-column: 3;
      grid-row: 1 / span 2;
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: #f8fafc;
      font-size: 28px;
      text-align: right;
      font-weight: 800;
    }

    .field-card .label {
      grid-column: 2;
      grid-row: 1;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 800;
    }

    .field-card > span:not(.label):not(.sub) {
      grid-column: 2;
      grid-row: 2;
      color: #e6eefb;
      font-weight: 800;
    }

    .field-card .sub {
      grid-column: 3;
      grid-row: 2;
      text-align: right;
      color: #b8c0cb;
      font-size: 11px;
      font-weight: 700;
      padding-top: 2px;
    }

    .chip-row {
      display: flex;
      gap: 6px;
      min-height: 30px;
      margin-bottom: 8px;
      padding: 6px;
      border-radius: 7px;
      background: var(--field-soft);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .chip-row::-webkit-scrollbar {
      display: none;
    }

    .chip {
      flex: 0 0 auto;
      min-height: 22px;
      padding: 2px 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.04);
      color: #cfd6df;
      font-size: 12px;
      font-weight: 700;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 42px 1fr auto auto;
      align-items: baseline;
      gap: 12px;
      padding: 9px 18px;
      border-bottom: 1px solid var(--line);
    }

    .summary-row:last-child {
      border-bottom: 0;
    }

    .summary-row::before {
      content: attr(data-icon);
      display: grid;
      place-items: center;
      align-self: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(180deg, #5e95ff, #2f6fe4);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
    }

    .summary-row span:first-child {
      color: #34425c;
      font-weight: 700;
    }

    .summary-row strong {
      color: #12234a;
      font-size: 20px;
      text-align: right;
    }

    .summary-row small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-align: right;
    }

    .matrix {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    .matrix th,
    .matrix td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .matrix th:last-child,
    .matrix td:last-child {
      border-right: 0;
    }

    .matrix thead th {
      height: 46px;
      padding: 10px 8px;
      font-size: 13px;
      text-align: center;
      font-weight: 800;
    }

    .logic-head {
      width: 150px;
      font-size: 18px !important;
    }

    .logic-choice {
      width: 100%;
      height: 34px;
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      font-weight: 900;
    }

    .logic-choice.is-active {
      background: var(--accent-soft);
      color: #2f6fe4;
      box-shadow: inset 0 0 0 1px rgba(47, 111, 228, 0.18);
    }

    .matrix[data-logic="breakout"] tbody .pullback-col,
    .matrix[data-logic="pullback"] tbody .breakout-col {
      display: none;
    }

    .row-title {
      width: 150px;
      padding: 0 8px;
      text-align: center;
      vertical-align: middle !important;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 900;
      white-space: pre-line;
    }

    .row-title span {
      display: inline-grid;
      grid-template-columns: 28px auto;
      align-items: center;
      gap: 8px;
      text-align: left;
      white-space: pre-line;
    }

    .row-title span::before {
      content: attr(data-icon);
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--accent-soft);
      color: #2f6fe4;
      font-weight: 900;
    }

    .cell-box {
      min-height: 170px;
      padding: 12px;
    }

    .tag-control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 8px;
    }

    .tag-control select,
    .new-tag input {
      width: 100%;
      min-width: 0;
      height: 34px;
      border: 1px solid #dce4ef;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      padding: 0 8px;
      outline: 0;
    }

    .tag-control button,
    .new-tag button {
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: #f4f7fc;
      border: 1px solid #dce4ef;
      color: #1c376b;
      font-size: 20px;
      font-weight: 900;
    }

    .new-tag {
      display: none;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-bottom: 8px;
    }

    .new-tag.is-open {
      display: grid;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 32px;
      margin-bottom: 8px;
    }

    .note-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      padding: 4px 7px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #245bc9;
      font-size: 12px;
      font-weight: 800;
    }

    .note-tag button {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(47, 111, 228, 0.16);
      color: #245bc9;
      line-height: 18px;
      font-size: 12px;
    }

    .subpage {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      padding: max(14px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
      background: rgba(246, 249, 253, 0.96);
      backdrop-filter: blur(18px);
      overflow: auto;
    }

    .subpage.is-open {
      display: block;
    }

    .subpage-inner {
      width: min(100%, 860px);
      margin: 0 auto;
      border: 1px solid rgba(217, 225, 234, 0.9);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .subpage-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .subpage-head h2 {
      margin: 0;
      font-size: 18px;
      color: var(--ink);
    }

    .subpage-head button,
    .tag-add button,
    .tag-delete {
      min-height: 34px;
      border-radius: 8px;
      font-weight: 800;
    }

    .subpage-head button {
      width: 34px;
      background: #f1f5fb;
      color: var(--ink);
      font-size: 18px;
    }

    .tag-manager {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 14px;
    }

    .tag-section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdff;
      overflow: hidden;
    }

    .tag-section h3 {
      margin: 0;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      font-size: 16px;
      color: var(--ink);
    }

    .tag-add {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
    }

    .tag-add input {
      width: 100%;
      min-width: 0;
      height: 36px;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      padding: 0 10px;
      outline: 0;
    }

    .tag-add button {
      padding: 0 12px;
      background: linear-gradient(180deg, #4b86ff, #2f6fe4);
      color: #fff;
    }

    .managed-tags {
      display: grid;
      gap: 8px;
      min-height: 120px;
      padding: 10px;
      align-content: start;
    }

    .managed-tag {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      background: #fff;
    }

    .managed-tag span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      color: #2b3d59;
    }

    .tag-delete {
      padding: 0 10px;
      background: #fff1f4;
      color: #bd284d;
      border: 1px solid #ffd3dd;
    }

    .tag-empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom));
      z-index: 50;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      max-width: calc(100vw - 32px);
      padding: 10px 14px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: 14px;
      transition: opacity 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .toast.is-open {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 680px) {
      body {
        padding-left: 8px;
        padding-right: 8px;
      }

      .layout {
        display: block;
        width: min(100%, 940px);
      }

      .sidebar {
        position: static;
        display: block;
        width: 100%;
        height: auto;
        max-height: none;
        margin-bottom: 10px;
      }

      .record-list {
        gap: 6px;
      }

      .record-pill {
        gap: 4px;
        padding: 7px 8px;
        border-radius: 8px;
      }

      .record-title {
        font-size: 12px;
        padding-right: 30px;
      }

      .logic-badge {
        padding: 1px 5px;
        font-size: 9px;
      }

      .record-meta {
        font-size: 10px;
      }

      .record-detail {
        grid-template-columns: repeat(4, 1fr);
        gap: 3px 6px;
        font-size: 10px;
        line-height: 1.12;
      }

      .record-line span {
        font-size: 9px;
      }

      .record-line strong {
        font-size: 10px;
      }

      .record-delete {
        top: 2px;
        right: 2px;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        font-size: 13px;
      }

      .toolbar {
        width: auto;
        margin: 0 0 10px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 6px 0 8px;
        background: linear-gradient(180deg, rgba(246, 249, 253, 0.98) 80%, rgba(246, 249, 253, 0));
      }

      .toolbar button {
        min-width: 0;
        min-height: 38px;
        padding: 0 6px;
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .meta-grid,
      .calculator {
        grid-template-columns: 1fr;
      }

      .tag-manager {
        grid-template-columns: 1fr;
      }

      .meta-field {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .meta-field:last-child {
        border-bottom: 0;
      }

      .dark-panel {
        min-height: auto;
      }

      .matrix {
        display: block;
        border-top: 0;
      }

      .matrix thead,
      .matrix thead tr,
      .matrix thead th {
        display: block;
        width: 100%;
      }

      .matrix thead tr {
        border-top: 1px solid var(--line);
      }

      .logic-head {
        display: block;
        text-align: left !important;
        border-bottom: 1px solid var(--line);
      }

      .matrix thead th:not(.logic-head) {
        border-right: 0;
      }

      .matrix tbody,
      .matrix tr,
      .matrix td,
      .matrix th {
        display: block;
        width: 100%;
      }

      .matrix tr {
        border-top: 1px solid var(--line);
      }

      .row-title {
        padding: 9px 10px;
        text-align: left;
        background: #f0f3f8;
        white-space: normal;
        font-size: 17px;
      }

      .matrix td {
        border-right: 0;
      }

      .cell-box {
        min-height: 156px;
      }

      .cell-box::before {
        content: "";
        display: block;
        margin: 0;
      }
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .toolbar,
      .sidebar,
      .side-backdrop,
      .toast,
      .tag-control,
      .new-tag,
      .sheet {
        border: 0;
        box-shadow: none;
      }

      .cell-box {
        min-height: 190px;
      }
    }
  </style>
</head>
<body>
  <nav class="toolbar" aria-label="页面操作">
    <button id="newBtn" type="button" class="secondary">新建</button>
    <button id="saveBtn" type="button">保存</button>
    <button id="tagManageBtn" type="button" class="secondary">标签管理</button>
    <button id="copyBtn" type="button" class="secondary">复制文本</button>
    <button id="resetBtn" type="button" class="secondary">清空当前</button>
    <button id="printBtn" type="button" class="secondary">打印/PDF</button>
  </nav>

  <div class="side-backdrop" id="sideBackdrop"></div>
  <div class="layout" id="layout">
    <aside class="sidebar" id="sidebar" aria-label="已保存记录">
      <div class="side-title">
        <span>保存记录</span>
      </div>
      <div class="record-list" id="recordList"></div>
    </aside>

    <main class="app">
      <section class="sheet" id="recordSheet">
      <div class="meta-grid">
        <div class="meta-field">
          <label for="symbol">标的名称:</label>
          <input id="symbol" data-save="symbol" type="text" placeholder="例如 AAPL / BTC">
        </div>
        <div class="meta-field">
          <label for="buyTime">买入时间:</label>
          <input id="buyTime" data-save="buyTime" type="datetime-local">
        </div>
      </div>

      <div class="calculator">
        <section class="dark-panel" aria-label="入场与止损">
          <label class="field-card" data-icon="入">
            <span class="label">入场单价</span>
            <input id="entryPrice" data-save="entryPrice" type="number" inputmode="decimal" step="0.001" value="10">
            <span>元</span>
          </label>
          <div class="chip-row" aria-label="止损快捷比例">
            <button class="chip" type="button" data-loss="0.05">15% / -5%</button>
            <button class="chip" type="button" data-loss="0.03">10% / -3%</button>
            <button class="chip" type="button" data-loss="0.003">0.8% / -0.3%</button>
          </div>
          <label class="field-card" data-icon="止">
            <span class="label">止损单价</span>
            <input id="stopPrice" data-save="stopPrice" type="number" inputmode="decimal" step="0.001" value="9">
            <span>元</span>
            <span class="sub" id="lossMeta">-1.0000 （-10%）</span>
          </label>
          <div class="chip-row" aria-label="盈亏比快捷选择">
            <button class="chip" type="button" data-ratio="3">3 : 1</button>
            <button class="chip" type="button" data-ratio="2.8">2.8 : 1</button>
            <button class="chip" type="button" data-ratio="2.5">2.5 : 1</button>
            <button class="chip" type="button" data-ratio="2.2">2.2 : 1</button>
            <button class="chip" type="button" data-ratio="2">2 : 1</button>
          </div>
        </section>

        <section class="dark-panel" aria-label="目标与金额">
          <label class="field-card" data-icon="目">
            <span class="label">目标单价</span>
            <input id="targetPrice" data-save="targetPrice" type="number" inputmode="decimal" step="0.001" value="12.5">
            <span>元</span>
            <span class="sub" id="profitMeta">2.5000 （+25%）</span>
          </label>
          <label class="field-card" data-icon="数">
            <span class="label">交易数量</span>
            <input id="quantity" data-save="quantity" type="number" inputmode="decimal" step="1" value="100">
          </label>
          <label class="field-card" data-icon="额">
            <span class="label">入场总金额</span>
            <input id="entryAmount" data-save="entryAmount" type="number" inputmode="decimal" step="0.01" value="1000">
            <span>元</span>
          </label>
        </section>

        <section class="dark-panel summary" aria-label="计算结果">
          <div class="summary-row" data-icon="比">
            <span>盈亏比</span>
            <strong id="ratioText">2.50 : 1</strong>
          </div>
          <div class="summary-row" data-icon="盈">
            <span>目标利润</span>
            <strong id="profitAmount">250.00 元</strong>
            <small id="profitPercent">+25%</small>
          </div>
          <div class="summary-row" data-icon="亏">
            <span>预计亏损</span>
            <strong id="lossAmount">-100.00 元</strong>
            <small id="lossPercent">-10%</small>
          </div>
          <div class="summary-row" data-icon="目">
            <span>目标总金额</span>
            <strong id="targetAmount">1,250.00 元</strong>
          </div>
          <div class="summary-row" data-icon="止">
            <span>止损总金额</span>
            <strong id="stopAmount">900.00 元</strong>
          </div>
        </section>
      </div>

      <table class="matrix" id="recordMatrix" aria-label="交易依据记录表">
        <thead>
          <tr>
            <th class="logic-head">逻辑</th>
            <th class="breakout-col">
              <button class="logic-choice" type="button" data-logic-choice="breakout">形态突破</button>
            </th>
            <th class="pullback-col">
              <button class="logic-choice" type="button" data-logic-choice="pullback">回调反弹</button>
            </th>
          </tr>
        </thead>
        <tbody id="matrixBody"></tbody>
      </table>
      </section>
    </main>
  </div>

  <section class="subpage" id="tagPage" aria-label="标签管理">
    <div class="subpage-inner">
      <header class="subpage-head">
        <h2>标签管理</h2>
        <button id="closeTagPageBtn" type="button" aria-label="关闭标签管理">×</button>
      </header>
      <div class="tag-manager" id="tagManager"></div>
    </div>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";

      var storageKey = "trade-record-generator-v2";
      var legacyStorageKey = "trade-record-generator-v1";
      var rows = [
        { id: "momentum", label: "动能\n依据", icon: "动" },
        { id: "support", label: "支撑\n形态", icon: "支" },
        { id: "pressure", label: "压力\n形态", icon: "压" }
      ];
      var cols = [
        { id: "breakout", label: "形态突破" },
        { id: "pullback", label: "回调反弹" }
      ];
      var state = {
        currentId: null,
        records: [],
        tagLibrary: createEmptyTagLibrary()
      };

      var els = {};

      function $(id) {
        return document.getElementById(id);
      }

      function numberValue(id) {
        var value = parseFloat($(id).value);
        return Number.isFinite(value) ? value : 0;
      }

      function money(value) {
        return value.toLocaleString("zh-CN", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }) + " 元";
      }

      function signedPercent(value) {
        if (!Number.isFinite(value)) return "0%";
        var sign = value > 0 ? "+" : "";
        return sign + (value * 100).toFixed(2).replace(/\.?0+$/, "") + "%";
      }

      function signedFixed(value) {
        var sign = value > 0 ? "+" : "";
        return sign + value.toFixed(4);
      }

      function showToast(message) {
        els.toast.textContent = message;
        els.toast.classList.add("is-open");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(function () {
          els.toast.classList.remove("is-open");
        }, 1600);
      }

      function getCellKey(rowId, colId) {
        return rowId + "__" + colId;
      }

      function createEmptyTagLibrary() {
        return rows.reduce(function (library, row) {
          library[row.id] = [];
          return library;
        }, {});
      }

      function nowInputValue() {
        var now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        return now.toISOString().slice(0, 16);
      }

      function createDefaultFields() {
        return {
          symbol: "",
          buyTime: nowInputValue(),
          entryPrice: "10",
          stopPrice: "9",
          targetPrice: "12.5",
          quantity: "100",
          entryAmount: "1000"
        };
      }

      function createRecord(fields, cells) {
        var id = "record-" + Date.now() + "-" + Math.random().toString(16).slice(2);
        return {
          id: id,
          fields: fields || createDefaultFields(),
          cells: cells || {},
          selectedLogic: "breakout",
          updatedAt: new Date().toISOString()
        };
      }

      function activeRecord() {
        var record = state.records.find(function (item) {
          return item.id === state.currentId;
        });
        if (!record) {
          record = createRecord();
          state.records.unshift(record);
          state.currentId = record.id;
        }
        if (!record.fields) record.fields = createDefaultFields();
        if (!record.cells) record.cells = {};
        if (!record.selectedLogic) record.selectedLogic = "breakout";
        return record;
      }

      function ensureCell(key) {
        var record = activeRecord();
        if (!record.cells[key]) {
          record.cells[key] = { tags: [] };
        }
        return record.cells[key];
      }

      function normalizeTagLibrary(library) {
        var normalized = createEmptyTagLibrary();
        if (Array.isArray(library)) return normalized;
        rows.forEach(function (row) {
          if (library && Array.isArray(library[row.id])) {
            normalized[row.id] = library[row.id].filter(Boolean);
          }
        });
        return normalized;
      }

      function readStorage() {
        try {
          var saved = JSON.parse(localStorage.getItem(storageKey) || "null");
          if (saved && Array.isArray(saved.records)) {
            state.currentId = saved.currentId || null;
            state.records = saved.records.length ? saved.records : [createRecord()];
            state.tagLibrary = normalizeTagLibrary(saved.tagLibrary);
          } else {
            var legacy = JSON.parse(localStorage.getItem(legacyStorageKey) || "null");
            if (legacy) {
              state.records = [createRecord(legacy.fields || createDefaultFields(), legacy.cells || {})];
              state.currentId = state.records[0].id;
              state.tagLibrary = createEmptyTagLibrary();
            }
          }
        } catch (error) {
          state = {
            currentId: null,
            records: [],
            tagLibrary: createEmptyTagLibrary()
          };
        }
        activeRecord();
      }

      function writeStorage(silent) {
        var record = activeRecord();
        document.querySelectorAll("[data-save]").forEach(function (input) {
          record.fields[input.id] = input.value;
        });
        record.updatedAt = new Date().toISOString();
        localStorage.setItem(storageKey, JSON.stringify(state));
        renderRecords();
        if (!silent) showToast("已保存到本机");
      }

      function hydrateFields() {
        var fields = activeRecord().fields;
        document.querySelectorAll("[data-save]").forEach(function (input) {
          if (fields[input.id] !== undefined) {
            input.value = fields[input.id];
          } else if (createDefaultFields()[input.id] !== undefined) {
            input.value = createDefaultFields()[input.id];
          }
        });

        if (!$("buyTime").value) {
          $("buyTime").value = nowInputValue();
        }
      }

      function getRecordTitle(record) {
        var symbol = (record.fields && record.fields.symbol || "").trim();
        var time = record.fields && record.fields.buyTime
          ? record.fields.buyTime.slice(5, 16).replace("T", " ")
          : "";
        return (symbol || "未命名记录") + (time ? " · " + time : "");
      }

      function parseRecordNumber(record, id) {
        var value = parseFloat(record.fields && record.fields[id]);
        return Number.isFinite(value) ? value : 0;
      }

      function formatRecordValue(value, digits) {
        if (!Number.isFinite(value)) return "-";
        return value.toLocaleString("zh-CN", {
          minimumFractionDigits: 0,
          maximumFractionDigits: digits
        });
      }

      function getRecordSummary(record) {
        var fields = record.fields || {};
        var logicId = record.selectedLogic || "breakout";
        var entry = parseRecordNumber(record, "entryPrice");
        var stop = parseRecordNumber(record, "stopPrice");
        var target = parseRecordNumber(record, "targetPrice");
        var quantity = parseRecordNumber(record, "quantity");
        var amount = parseRecordNumber(record, "entryAmount");
        var risk = Math.abs(entry - stop);
        var reward = Math.abs(target - entry);
        var ratio = risk > 0 ? reward / risk : 0;
        return {
          title: (fields.symbol || "未命名记录").trim() || "未命名记录",
          time: fields.buyTime ? fields.buyTime.replace("T", " ") : "未设置时间",
          entry: formatRecordValue(entry, 4),
          target: formatRecordValue(target, 4),
          stop: formatRecordValue(stop, 4),
          quantity: formatRecordValue(quantity, 4),
          amount: formatRecordValue(amount, 2),
          ratio: ratio > 0 ? ratio.toFixed(2) + " : 1" : "-",
          logic: getLogicLabel(logicId),
          logicId: logicId
        };
      }

      function renderRecords() {
        var list = $("recordList");
        if (!list) return;
        if (!state.records.length) {
          list.innerHTML = '<div class="empty-records">还没有保存记录</div>';
          return;
        }
        list.innerHTML = state.records.map(function (record) {
          var active = record.id === state.currentId ? " is-active" : "";
          var summary = getRecordSummary(record);
          var logicClass = summary.logicId === "pullback" ? "is-pullback" : "is-breakout";
          return '<div class="record-pill ' + logicClass + active + '" data-record-id="' + record.id + '" role="button" tabindex="0">' +
            '<button type="button" class="record-delete" data-delete-record="' + record.id + '" aria-label="删除记录">×</button>' +
            '<span class="record-title">' +
              '<span class="record-name">' + escapeHtml(summary.title) + '</span>' +
              '<span class="logic-badge ' + logicClass + '">' + escapeHtml(summary.logic) + '</span>' +
            '</span>' +
            '<span class="record-meta">' + escapeHtml(summary.time) + '</span>' +
            '<span class="record-detail">' +
              '<span class="record-line"><span>入场</span><strong>' + escapeHtml(summary.entry) + '</strong></span>' +
              '<span class="record-line"><span>目标</span><strong>' + escapeHtml(summary.target) + '</strong></span>' +
              '<span class="record-line"><span>止损</span><strong>' + escapeHtml(summary.stop) + '</strong></span>' +
              '<span class="record-line"><span>数量</span><strong>' + escapeHtml(summary.quantity) + '</strong></span>' +
              '<span class="record-line"><span>金额</span><strong>' + escapeHtml(summary.amount) + '</strong></span>' +
              '<span class="record-line"><span>盈亏比</span><strong>' + escapeHtml(summary.ratio) + '</strong></span>' +
            '</span>' +
          '</div>';
        }).join("");
      }

      function getLogicLabel(logicId) {
        var logic = cols.find(function (col) { return col.id === logicId; });
        return logic ? logic.label : "形态突破";
      }

      function updateLogicView() {
        var record = activeRecord();
        var logic = record.selectedLogic || "breakout";
        $("recordMatrix").dataset.logic = logic;
        document.querySelectorAll("[data-logic-choice]").forEach(function (button) {
          button.classList.toggle("is-active", button.dataset.logicChoice === logic);
        });
        renderRecords();
      }

      function setLogic(logicId) {
        activeRecord().selectedLogic = logicId;
        updateLogicView();
        writeStorage(true);
      }

      function renderTagManager() {
        var manager = $("tagManager");
        if (!manager) return;
        manager.innerHTML = rows.map(function (row) {
          var tags = state.tagLibrary[row.id] || [];
          var list = tags.length
            ? tags.map(function (tag) {
              return '<div class="managed-tag">' +
                '<span>' + escapeHtml(tag) + '</span>' +
                '<button type="button" class="tag-delete" data-row="' + row.id + '" data-tag="' + escapeHtml(tag) + '">删除</button>' +
              '</div>';
            }).join("")
            : '<div class="tag-empty">暂无标签，输入后会出现在此分类的下拉菜单中。</div>';
          return '<section class="tag-section">' +
            '<h3>' + row.label.replace("\n", "") + '</h3>' +
            '<div class="tag-add">' +
              '<input type="text" data-tag-input="' + row.id + '" placeholder="新增标签">' +
              '<button type="button" data-tag-add="' + row.id + '">添加</button>' +
            '</div>' +
            '<div class="managed-tags">' + list + '</div>' +
          '</section>';
        }).join("");
      }

      function openTagPage() {
        renderTagManager();
        $("tagPage").classList.add("is-open");
      }

      function closeTagPage() {
        $("tagPage").classList.remove("is-open");
      }

      function addManagedTag(rowId, value) {
        var tag = value.trim();
        if (!tag) return;
        if (!state.tagLibrary[rowId]) state.tagLibrary[rowId] = [];
        if (state.tagLibrary[rowId].indexOf(tag) === -1) {
          state.tagLibrary[rowId].push(tag);
        }
        writeStorage(true);
        refreshSelects();
        renderTagManager();
      }

      function deleteManagedTag(rowId, tag) {
        if (!window.confirm("确认删除标签“" + tag + "”？已使用的位置也会移除。")) return;
        state.tagLibrary[rowId] = (state.tagLibrary[rowId] || []).filter(function (item) {
          return item !== tag;
        });
        state.records.forEach(function (record) {
          cols.forEach(function (col) {
            var key = getCellKey(rowId, col.id);
            if (record.cells && record.cells[key] && Array.isArray(record.cells[key].tags)) {
              record.cells[key].tags = record.cells[key].tags.filter(function (item) {
                return item !== tag;
              });
            }
          });
        });
        writeStorage(true);
        renderMatrix();
        renderTagManager();
        showToast("标签已删除");
      }

      function loadRecord(id) {
        writeStorage(true);
        state.currentId = id;
        hydrateFields();
        renderMatrix();
        recalc();
        renderRecords();
        updateLogicView();
      }

      function renderMatrix() {
        var html = rows.map(function (row) {
          var cells = cols.map(function (col) {
            var key = getCellKey(row.id, col.id);
            ensureCell(key);
            return '' +
              '<td class="' + col.id + '-col">' +
                '<div class="cell-box" data-col="' + col.label + '" data-row="' + row.id + '" data-cell="' + key + '">' +
                  '<div class="tag-control">' +
                    '<select data-role="select" aria-label="' + row.label.replace("\\n", "") + col.label + '标签">' +
                      renderOptions(row.id) +
                    '</select>' +
                    '<button type="button" data-role="openAdd" aria-label="添加新标签">+</button>' +
                  '</div>' +
                  '<div class="new-tag">' +
                    '<input data-role="newTag" type="text" placeholder="输入新标签">' +
                    '<button type="button" data-role="saveTag" aria-label="保存新标签">✓</button>' +
                  '</div>' +
                  '<div class="tag-list" data-role="tagList"></div>' +
                '</div>' +
              '</td>';
          }).join("");
          return '<tr><th class="row-title"><span data-icon="' + row.icon + '">' + row.label + '</span></th>' + cells + '</tr>';
        }).join("");

        $("matrixBody").innerHTML = html;
        document.querySelectorAll(".cell-box").forEach(bindCell);
        updateLogicView();
      }

      function renderOptions(rowId) {
        if (!state.tagLibrary[rowId]) state.tagLibrary[rowId] = [];
        var tags = state.tagLibrary[rowId] || [];
        return '<option value="">' + (tags.length ? "选择标签" : "先添加标签") + '</option>' + tags.map(function (tag) {
          return '<option value="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</option>';
        }).join("");
      }

      function refreshSelects() {
        document.querySelectorAll('[data-role="select"]').forEach(function (select) {
          var current = select.value;
          var rowId = select.closest(".cell-box").dataset.row;
          select.innerHTML = renderOptions(rowId);
          select.value = current;
        });
      }

      function escapeHtml(text) {
        return String(text).replace(/[&<>"']/g, function (char) {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;"
          }[char];
        });
      }

      function bindCell(cellEl) {
        var key = cellEl.dataset.cell;
        var rowId = cellEl.dataset.row;
        var cell = ensureCell(key);
        var select = cellEl.querySelector('[data-role="select"]');
        var tagList = cellEl.querySelector('[data-role="tagList"]');
        var newTagWrap = cellEl.querySelector(".new-tag");
        var newTag = cellEl.querySelector('[data-role="newTag"]');

        function renderTags() {
          tagList.innerHTML = cell.tags.map(function (tag, index) {
            return '<span class="note-tag">' + escapeHtml(tag) +
              '<button type="button" data-index="' + index + '" aria-label="删除标签">×</button></span>';
          }).join("");
        }

        renderTags();

        select.addEventListener("change", function () {
          if (select.value && cell.tags.indexOf(select.value) === -1) {
            cell.tags.push(select.value);
            renderTags();
            writeStorage(true);
          }
          select.value = "";
        });

        tagList.addEventListener("click", function (event) {
          if (event.target.matches("button")) {
            cell.tags.splice(parseInt(event.target.dataset.index, 10), 1);
            renderTags();
            writeStorage(true);
          }
        });

        cellEl.querySelector('[data-role="openAdd"]').addEventListener("click", function () {
          newTagWrap.classList.toggle("is-open");
          if (newTagWrap.classList.contains("is-open")) {
            newTag.focus();
          }
        });

        cellEl.querySelector('[data-role="saveTag"]').addEventListener("click", function () {
          var value = newTag.value.trim();
          if (!value) return;
          if (!state.tagLibrary[rowId]) state.tagLibrary[rowId] = [];
          if (state.tagLibrary[rowId].indexOf(value) === -1) {
            state.tagLibrary[rowId].push(value);
            refreshSelects();
            renderTagManager();
          }
          if (cell.tags.indexOf(value) === -1) {
            cell.tags.push(value);
            renderTags();
          }
          newTag.value = "";
          newTagWrap.classList.remove("is-open");
          writeStorage(true);
          showToast("标签已加入");
        });
      }

      function recalc(source) {
        var entry = numberValue("entryPrice");
        var stop = numberValue("stopPrice");
        var target = numberValue("targetPrice");
        var quantity = numberValue("quantity");
        var amount = numberValue("entryAmount");

        if (source === "quantity" && entry > 0) {
          amount = entry * quantity;
          $("entryAmount").value = amount.toFixed(2);
        }

        if (source === "entryAmount" && entry > 0) {
          quantity = amount / entry;
          $("quantity").value = Number.isInteger(quantity) ? String(quantity) : quantity.toFixed(4);
        }

        var riskPerUnit = Math.abs(entry - stop);
        var profitPerUnit = target - entry;
        var ratio = riskPerUnit > 0 ? Math.abs(profitPerUnit / riskPerUnit) : 0;
        var profitRate = entry > 0 ? (target - entry) / entry : 0;
        var lossRate = entry > 0 ? (stop - entry) / entry : 0;
        var profitAmount = (target - entry) * quantity;
        var lossAmount = (stop - entry) * quantity;

        $("lossMeta").textContent = signedFixed(stop - entry) + " （" + signedPercent(lossRate) + "）";
        $("profitMeta").textContent = signedFixed(target - entry) + " （" + signedPercent(profitRate) + "）";
        $("ratioText").textContent = ratio.toFixed(2) + " : 1";
        $("profitAmount").textContent = money(profitAmount);
        $("profitPercent").textContent = signedPercent(profitRate);
        $("lossAmount").textContent = money(lossAmount);
        $("lossPercent").textContent = signedPercent(lossRate);
        $("targetAmount").textContent = money(target * quantity);
        $("stopAmount").textContent = money(stop * quantity);
      }

      function applyRatio(ratio) {
        var entry = numberValue("entryPrice");
        var stop = numberValue("stopPrice");
        var risk = Math.abs(entry - stop);
        if (entry <= 0 || risk <= 0) return;
        $("targetPrice").value = (entry + risk * ratio).toFixed(3);
        recalc("targetPrice");
        writeStorage(true);
      }

      function applyLoss(rate) {
        var entry = numberValue("entryPrice");
        if (entry <= 0) return;
        $("stopPrice").value = (entry * (1 - rate)).toFixed(3);
        recalc("stopPrice");
        writeStorage(true);
      }

      function copyText() {
        var lines = [];
        lines.push("标的名称: " + $("symbol").value);
        lines.push("买入时间: " + $("buyTime").value.replace("T", " "));
        lines.push("逻辑: " + getLogicLabel(activeRecord().selectedLogic || "breakout"));
        lines.push("入场单价: " + $("entryPrice").value + " 元");
        lines.push("止损单价: " + $("stopPrice").value + " 元");
        lines.push("目标单价: " + $("targetPrice").value + " 元");
        lines.push("交易数量: " + $("quantity").value);
        lines.push("入场总金额: " + $("entryAmount").value + " 元");
        rows.forEach(function (row) {
          cols.forEach(function (col) {
            var cell = ensureCell(getCellKey(row.id, col.id));
            var title = row.label.replace("\n", "") + " / " + col.label;
            var content = []
              .concat(cell.tags.map(function (tag) { return "#" + tag; }))
              .join(" ");
            lines.push(title + ": " + content);
          });
        });

        var text = lines.join("\n");
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            showToast("已复制文本");
          }, fallbackCopy.bind(null, text));
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        var temp = document.createElement("textarea");
        temp.value = text;
        temp.style.position = "fixed";
        temp.style.opacity = "0";
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
        showToast("已复制文本");
      }

      function resetAll() {
        if (!window.confirm("确认清空当前记录？标签库会保留。")) return;
        var record = activeRecord();
        record.fields = createDefaultFields();
        record.cells = {};
        localStorage.setItem(storageKey, JSON.stringify(state));
        hydrateFields();
        renderMatrix();
        recalc();
        renderRecords();
      }

      function newRecord() {
        writeStorage(true);
        var record = createRecord();
        state.records.unshift(record);
        state.currentId = record.id;
        hydrateFields();
        renderMatrix();
        recalc();
        writeStorage(true);
        showToast("已新建记录");
      }

      function deleteRecord(recordId) {
        var targetId = recordId || state.currentId;
        if (!window.confirm("确认删除这条保存记录？")) return;
        state.records = state.records.filter(function (record) {
          return record.id !== targetId;
        });
        if (!state.records.length) {
          state.records.push(createRecord());
        }
        if (state.currentId === targetId) {
          state.currentId = state.records[0].id;
        }
        hydrateFields();
        renderMatrix();
        recalc();
        writeStorage(true);
        showToast("已删除记录");
      }

      function handleRecordListAction(event) {
        var deleteButton = event.target.closest("[data-delete-record]");
        if (deleteButton) {
          event.preventDefault();
          event.stopPropagation();
          var now = Date.now();
          if (handleRecordListAction.lastDeleteAt && now - handleRecordListAction.lastDeleteAt < 700) return;
          handleRecordListAction.lastDeleteAt = now;
          deleteRecord(deleteButton.dataset.deleteRecord);
          return;
        }
        if (event.type !== "click") return;
        var button = event.target.closest("[data-record-id]");
        if (button) loadRecord(button.dataset.recordId);
      }

      function bindEvents() {
        document.querySelectorAll("[data-save]").forEach(function (input) {
          input.addEventListener("input", function () {
            recalc(input.id);
            writeStorage(true);
          });
          input.addEventListener("change", function () {
            recalc(input.id);
            writeStorage(true);
          });
        });

        document.querySelectorAll("[data-ratio]").forEach(function (button) {
          button.addEventListener("click", function () {
            applyRatio(parseFloat(button.dataset.ratio));
          });
        });

        document.querySelectorAll("[data-loss]").forEach(function (button) {
          button.addEventListener("click", function () {
            applyLoss(parseFloat(button.dataset.loss));
          });
        });

        $("saveBtn").addEventListener("click", function () { writeStorage(false); });
        $("newBtn").addEventListener("click", newRecord);
        $("tagManageBtn").addEventListener("click", openTagPage);
        $("closeTagPageBtn").addEventListener("click", closeTagPage);
        $("copyBtn").addEventListener("click", copyText);
        $("resetBtn").addEventListener("click", resetAll);
        $("printBtn").addEventListener("click", function () { window.print(); });
        document.querySelectorAll("[data-logic-choice]").forEach(function (button) {
          button.addEventListener("click", function () {
            setLogic(button.dataset.logicChoice);
          });
        });
        $("recordList").addEventListener("click", handleRecordListAction);
        $("recordList").addEventListener("touchend", handleRecordListAction, { passive: false });
        $("recordList").addEventListener("pointerup", handleRecordListAction);
        $("recordList").addEventListener("keydown", function (event) {
          if (event.key !== "Enter" && event.key !== " ") return;
          var card = event.target.closest("[data-record-id]");
          if (card && !event.target.closest("[data-delete-record]")) {
            event.preventDefault();
            loadRecord(card.dataset.recordId);
          }
        });
        $("tagManager").addEventListener("click", function (event) {
          var addButton = event.target.closest("[data-tag-add]");
          var deleteButton = event.target.closest("[data-tag]");
          if (addButton) {
            var rowId = addButton.dataset.tagAdd;
            var input = document.querySelector('[data-tag-input="' + rowId + '"]');
            addManagedTag(rowId, input.value);
          } else if (deleteButton) {
            deleteManagedTag(deleteButton.dataset.row, deleteButton.dataset.tag);
          }
        });
        $("tagManager").addEventListener("keydown", function (event) {
          if (event.key !== "Enter") return;
          var input = event.target.closest("[data-tag-input]");
          if (input) addManagedTag(input.dataset.tagInput, input.value);
        });
      }

      function init() {
        els.toast = $("toast");
        readStorage();
        hydrateFields();
        renderMatrix();
        bindEvents();
        recalc();
        renderRecords();
        renderTagManager();
      }

      init();
    })();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
